          setEdgePop({from:ed.from,to:ed.to,sx:mx*s.view.k+s.view.x,sy:my*s.view.k+s.view.y});
          return;
        }
        s.pan={sx:e.clientX,sy:e.clientY,vx:s.view.x,vy:s.view.y};
        canvas.style.cursor='grabbing';
      }
    };
    const move=e=>{
      const w=toWorld(e.clientX,e.clientY);
      s.mouse={x:e.clientX,y:e.clientY,wx:w.x,wy:w.y};
      if(s.drag){
        const n=s.drag.n;
        n.x=w.x-s.drag.ox;n.y=w.y-s.drag.oy;n.vx=0;n.vy=0;
        if(Math.abs(e.movementX)+Math.abs(e.movementY)>1)s.drag.moved=true;
        s.alpha=Math.max(s.alpha,.25);
        return;
      }
      if(s.pan){s.view.x=s.pan.vx+(e.clientX-s.pan.sx);s.view.y=s.pan.vy+(e.clientY-s.pan.sy);return;}
      const n=hitNode(w.x,w.y);
      s.hover=n?n.id:null;
      canvas.style.cursor=n?'pointer':(linkModeRef.current?'crosshair':'grab');
    };
    const up=e=>{
      if(s.drag){
        const n=s.drag.n;n.fixed=false;
        if(s.drag.moved){n.pinned=true;persistPositions();}
        else{setInspect(n.id);}
        s.drag=null;
      }
      if(s.pan){s.pan=null;canvas.style.cursor='grab';}
    };
    const dbl=e=>{
      const w=toWorld(e.clientX,e.clientY);
      if(hitNode(w.x,w.y))return;
      const r=wrap.getBoundingClientRect();
      setQuickAdd({sx:e.clientX-r.left,sy:e.clientY-r.top,wx:w.x,wy:w.y});
    };
    const wheel=e=>{
      e.preventDefault();
      const r=wrap.getBoundingClientRect();
      const mx=e.clientX-r.left,my=e.clientY-r.top;
      const k2=Math.min(2.6,Math.max(.25,s.view.k*(e.deltaY<0?1.11:.9)));
      const f=k2/s.view.k;
      s.view={k:k2,x:mx-(mx-s.view.x)*f,y:my-(my-s.view.y)*f};
    };
    const key=e=>{if(e.key==='Escape'){s.linkFrom=null;setLinkFromUi(null);setLinkMode(false);setEdgePop(null);setQuickAdd(null);}};

    canvas.addEventListener('pointerdown',down);
    canvas.addEventListener('pointermove',move);
    canvas.addEventListener('pointerup',up);
    canvas.addEventListener('dblclick',dbl);
    canvas.addEventListener('wheel',wheel,{passive:false});
    window.addEventListener('keydown',key);
    return ()=>{running=false;cancelAnimationFrame(raf);ro.disconnect();
      canvas.removeEventListener('pointerdown',down);
      canvas.removeEventListener('pointermove',move);
      canvas.removeEventListener('pointerup',up);
      canvas.removeEventListener('dblclick',dbl);
      canvas.removeEventListener('wheel',wheel);
      window.removeEventListener('keydown',key);};
  },[]);

  const zoomBtn=(d)=>{const s=S.current;const r=wrapRef.current.getBoundingClientRect();
    const k2=Math.min(2.6,Math.max(.25,s.view.k*d));const f=k2/s.view.k;
    s.view={k:k2,x:r.width/2-(r.width/2-s.view.x)*f,y:r.height/2-(r.height/2-s.view.y)*f};};
  const reCluster=()=>{const s=S.current;s.nodes.forEach(n=>n.pinned=false);s.alpha=1;
    setPd({board:{...(pdRef.current.board||{}),positions:{}}});flash('Constellation released');};
  const doSearch=(ev)=>{if(ev.key!=='Enter')return;
    const t=q.trim().toLowerCase();if(!t)return;
    const hit=entities.find(e=>e.name.toLowerCase().includes(t));
    if(hit)focusNode(hit.id);else flash('No star by that name');};

  const saveQuick=(ent)=>{
    const exists=pdRef.current.entities.some(e=>e.id===ent.id);
    setPd({entities:exists?pdRef.current.entities.map(e=>e.id===ent.id?ent:e):[...pdRef.current.entities,ent]});
    if(pendingPos.current){
      const pos={...((pdRef.current.board||{}).positions||{})};
      pos[ent.id]={x:Math.round(pendingPos.current.x),y:Math.round(pendingPos.current.y)};
      setPd({board:{...(pdRef.current.board||{}),positions:pos}});
      pendingPos.current=null;
    }
    setEditing(null);flash('Added to the Codex');
  };
  const byId=useMemo(()=>Object.fromEntries(entities.map(e=>[e.id,e])),[entities]);
  const inspected=inspect?byId[inspect]:null;

  return (
    <div className="gal-wrap" ref={wrapRef}>
      <canvas ref={canvasRef}/>

      <div className="hud tl">
        <div className="hsearch"><span style={{color:'var(--faint)',fontSize:12}}>⌕</span>
          <input placeholder="Find a star…" value={q} onChange={e=>setQ(e.target.value)} onKeyDown={doSearch}/></div>
        <button className={'hbtn'+(linkMode?' on':'')} onClick={()=>{setLinkMode(v=>!v);S.current.linkFrom=null;setLinkFromUi(null);}}>⟡ Bind</button>
      </div>
      <div className="hud tr">
        <button className="hbtn" onClick={()=>zoomBtn(.88)}>−</button>
        <button className="hbtn" onClick={()=>zoomBtn(1.14)}>＋</button>
        <button className="hbtn" title="Let the constellation re-settle by interaction" onClick={()=>{S.current.alpha=1;}}>Settle</button>
        <button className="hbtn" onClick={()=>S.current.fit&&S.current.fit()}>Fit</button>
        <button className="hbtn" onClick={reCluster} title="Unpin everything and let the constellation settle">Release</button>
      </div>
      {linkMode && <div className="gal-note">{linkFromUi?'Now click the second star to bind':'Click two stars to bind them · Esc to stop'}</div>}

      <div className="hud bl">
        {Object.entries(ENTITY_TYPES).map(([k,T])=>{
          const n=entities.filter(e=>e.type===k).length;if(!n)return null;
          const off=hidden[k];
          return <span key={k} className="lchip" onClick={()=>setHidden(h=>({...h,[k]:!h[k]}))}
            style={{color:off?'var(--faint)':T.color,borderColor:off?'var(--hair2)':T.color+'66',opacity:off?.55:1}}>
            {T.g} {T.plural} {n}</span>;
        })}
      </div>

      {entities.length===0 &&
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
          <div className="empty" style={{pointerEvents:'auto'}}>
            <div className="glyph">✦</div>
            <div style={{maxWidth:330}}>An empty sky. Add entries in the Codex — or double-click anywhere here to place your first star.</div>
          </div>
        </div>}

      {edgePop && byId[edgePop.from] && (
        <div className="epop" style={{left:edgePop.sx,top:edgePop.sy,transform:'translate(-50%,-130%)'}} onPointerDown={e=>e.stopPropagation()}>
          <span className="muted" style={{fontSize:11,maxWidth:86,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{byId[edgePop.from].name} →</span>
          <input autoFocus defaultValue={relations[edgePop.from+'|'+edgePop.to]||''} placeholder="name this bond…"
            onChange={e=>setRelation(edgePop.from+'|'+edgePop.to,e.target.value)}
            style={{width:140,padding:'5px 9px',fontSize:12.5}}/>
          <button className="btn sm danger" title="Remove connection" onClick={()=>removeLink(edgePop.from,edgePop.to)}>✕</button>
          <span className="x" style={{fontSize:16}} onClick={()=>setEdgePop(null)}>×</span>
        </div>)}

      {quickAdd && (
        <div className="qadd" style={{left:Math.min(quickAdd.sx, (wrapRef.current?.clientWidth||400)-180),top:Math.min(quickAdd.sy,(wrapRef.current?.clientHeight||400)-260)}}>
          <div style={{fontFamily:'var(--mono)',fontSize:9,letterSpacing:1.6,color:'var(--faint)',textTransform:'uppercase',padding:'5px 11px 3px'}}>Place a new star</div>
          {Object.entries(ENTITY_TYPES).map(([k,T])=>(
            <div key={k} className="qi" onClick={()=>{
              pendingPos.current={x:quickAdd.wx,y:quickAdd.wy};
              setEditing({id:uid(),type:k,name:'',fields:{},tags:[],links:[],notes:'',createdAt:now()});
              setQuickAdd(null);}}>
              <span style={{color:T.color,width:15,textAlign:'center'}}>{T.g}</span>{T.label}
            </div>))}
        </div>)}

      {inspected && (
        <div className="inspector">
          <div style={{padding:'16px 18px',borderBottom:'1px solid var(--hair)',display:'flex',alignItems:'center',gap:10}}>
            <span className="chip" style={{color:ENTITY_TYPES[inspected.type].color,borderColor:ENTITY_TYPES[inspected.type].color+'55'}}>
              {ENTITY_TYPES[inspected.type].g} {ENTITY_TYPES[inspected.type].label}</span>
            <div style={{flex:1}}/>
            <button className="btn sm" onClick={()=>setEditing(inspected)}>Edit</button>
            <span className="x" onClick={()=>setInspect(null)}>×</span>
          </div>
          <InspectorBody ent={inspected} entities={entities} relations={relations} onFocus={focusNode}/>
        </div>)}

      {editing &&
        <EntityEditor ent={editing} entities={entities}
          onSave={saveQuick} onClose={()=>{setEditing(null);pendingPos.current=null;}}
          onDelete={entities.some(e=>e.id===editing.id)?()=>{
            const id=editing.id;
            setPd({entities:pdRef.current.entities.filter(x=>x.id!==id).map(x=>({...x,links:(x.links||[]).filter(l=>l!==id)}))});
            setEditing(null);setInspect(null);flash('Entry removed');}:null}/>}
    </div>
  );
}
function InspectorBody({ent,entities,relations,onFocus}){
  const url=useImageURL(ent.imageId);
  const F=ent.fields||{};
  const T=ENTITY_TYPES[ent.type];
  const out=(ent.links||[]).map(id=>entities.find(e=>e.id===id)).filter(Boolean);
  const inn=entities.filter(o=>(o.links||[]).includes(ent.id));
  const firstFields=T.fields.filter(f=>F[f]).slice(0,3);
  return (
    <div style={{padding:18}}>
      {url && <img src={url} alt="" style={{width:'100%',height:150,objectFit:'cover',borderRadius:11,marginBottom:14}}/>}
      <div style={{fontFamily:'var(--disp)',fontWeight:500,fontSize:24,lineHeight:1.15,marginBottom:10}}>{ent.name}</div>
      {firstFields.map(f=>(
        <div key={f} className="field" style={{marginBottom:10}}>
          <label>{FIELD_LABELS[f]||f}</label>
          <div style={{fontSize:13.5,whiteSpace:'pre-wrap'}}>{F[f]}</div>
        </div>))}
      {ent.notes && <div className="field" style={{marginBottom:10}}><label>Notes</label>
        <div style={{fontSize:13.5,whiteSpace:'pre-wrap'}}>{ent.notes}</div></div>}
      {(out.length>0||inn.length>0) && <>
        <hr className="rule" style={{margin:'14px 0'}}/>
        <div className="field"><label>Bonds</label></div>
        {out.map(l=>{const lab=relations[ent.id+'|'+l.id];
          return <div key={l.id} className="pill" style={{display:'flex',width:'100%'}} onClick={()=>onFocus(l.id)}>
            <span className="dot" style={{background:ENTITY_TYPES[l.type].color}}/>
            <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.name}</span>
            {lab && <span className="muted" style={{fontFamily:'var(--mono)',fontSize:9.5}}>{lab}</span>}
          </div>;})}
        {inn.filter(l=>!(ent.links||[]).includes(l.id)).map(l=>(
          <div key={l.id} className="pill" style={{display:'flex',width:'100%',opacity:.75}} onClick={()=>onFocus(l.id)}>
            <span className="dot" style={{background:ENTITY_TYPES[l.type].color}}/>
            <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.name}</span>
            <span className="muted" style={{fontFamily:'var(--mono)',fontSize:9.5}}>refers here</span>
          </div>))}
      </>}
    </div>
  );
}

/* ════════ PLOT ════════ */
function Plot({ctx}){
  const {pd,setPd,flash}=ctx;
  const acts=pd.plot.acts;
  const setActs=a=>setPd({plot:{...pd.plot,acts:a}});
  const addAct=()=>setActs([...acts,{id:uid(),title:'New act',chapters:[]}]);
  const updAct=(id,patch)=>setActs(acts.map(a=>a.id===id?{...a,...patch}:a));
  const delAct=id=>setActs(acts.filter(a=>a.id!==id));
  return (
    <div>
      <div className="between" style={{marginBottom:16}}>
        <p className="hint">Acts hold chapters; chapters hold beats. Bind beats to Codex entries to track who appears where.</p>
        <button className="btn gold" onClick={addAct}>＋ Add act</button>
      </div>
      {acts.length===0 && <div className="empty"><div className="glyph">▤</div>No structure yet. Add your first act to begin shaping the journey.</div>}
      {acts.map((act,i)=><ActBlock key={act.id} act={act} idx={i} updAct={updAct} delAct={delAct} flash={flash} ctx={ctx}/>)}
    </div>
  );
}
function ActBlock({act,idx,updAct,delAct,ctx}){
  const [edit,setEdit]=useState(false);
  const addCh=()=>updAct(act.id,{chapters:[...act.chapters,{id:uid(),title:'New chapter',summary:'',wordTarget:2500,status:'planned',beats:[]}]});
  const updCh=(cid,patch)=>updAct(act.id,{chapters:act.chapters.map(c=>c.id===cid?{...c,...patch}:c)});
  const delCh=cid=>updAct(act.id,{chapters:act.chapters.filter(c=>c.id!==cid)});
  return (
    <div className="card" style={{marginBottom:16,padding:16}}>
      <div className="between" style={{marginBottom:12}}>
        {edit
          ? <input value={act.title} autoFocus onBlur={()=>setEdit(false)} onKeyDown={e=>e.key==='Enter'&&setEdit(false)} onChange={e=>updAct(act.id,{title:e.target.value})} style={{maxWidth:340,fontFamily:'var(--disp)',fontSize:17}}/>
          : <div style={{fontFamily:'var(--disp)',fontWeight:500,fontSize:20,cursor:'pointer'}} onClick={()=>setEdit(true)}>
              <span style={{color:'var(--gold)',fontFamily:'var(--mono)',fontSize:10,letterSpacing:2,verticalAlign:'.35em',marginRight:10}}>ACT {idx+1}</span>{act.title}</div>}
        <div className="row" style={{gap:6}}>
          <button className="btn sm" onClick={addCh}>＋ Chapter</button>
          <button className="btn sm danger" onClick={()=>delAct(act.id)}>✕</button>
        </div>
      </div>
      {act.chapters.map((ch,ci)=><ChapterBlock key={ch.id} ch={ch} num={ci+1} updCh={updCh} delCh={delCh} ctx={ctx}/>)}
    </div>
  );
}
function ChapterBlock({ch,num,updCh,delCh,ctx}){
  const {pd}=ctx;
  const [open,setOpen]=useState(false);
  const STATUS={planned:'var(--faint)',drafting:'var(--gold)',revised:'#7cc6a0',done:'#7cc6a0'};
  const addBeat=()=>updCh(ch.id,{beats:[...ch.beats,{id:uid(),text:'',links:[]}]});
  const updBeat=(bid,patch)=>updCh(ch.id,{beats:ch.beats.map(b=>b.id===bid?{...b,...patch}:b)});
  const delBeat=bid=>updCh(ch.id,{beats:ch.beats.filter(b=>b.id!==bid)});
  const byId=Object.fromEntries(pd.entities.map(e=>[e.id,e]));
  return (
    <div style={{background:'rgba(255,255,255,.02)',border:'1px solid var(--hair)',borderRadius:11,padding:'10px 14px',marginBottom:9}}>
      <div className="between">
        <div className="row" style={{gap:9,flex:1,cursor:'pointer'}} onClick={()=>setOpen(o=>!o)}>
          <span style={{color:'var(--faint)',fontSize:11}}>{open?'▾':'▸'}</span>
          <span className="dot" style={{background:STATUS[ch.status]}}/>
          <input value={ch.title} onClick={e=>e.stopPropagation()} onChange={e=>updCh(ch.id,{title:e.target.value})} style={{background:'transparent',border:'none',fontFamily:'var(--disp)',fontSize:16,padding:0,maxWidth:320}}/>
        </div>
        <span className="muted" style={{fontFamily:'var(--mono)',fontSize:10.5}}>{ch.beats.length} beats</span>
      </div>
      {open &&
        <div style={{marginTop:12,paddingTop:10,borderTop:'1px solid var(--hair)'}}>
          <div className="row" style={{gap:10,marginBottom:10}}>
            <select value={ch.status} onChange={e=>updCh(ch.id,{status:e.target.value})} style={{maxWidth:140}}>
              <option value="planned">Planned</option><option value="drafting">Drafting</option>
              <option value="revised">Revised</option><option value="done">Done</option>
            </select>
            <div className="row" style={{gap:6}}>
              <span className="muted" style={{fontSize:12}}>Target</span>
              <input type="number" value={ch.wordTarget} onChange={e=>updCh(ch.id,{wordTarget:+e.target.value})} style={{width:90}}/>
            </div>
          </div>
          <textarea rows={2} placeholder="Chapter summary…" value={ch.summary} onChange={e=>updCh(ch.id,{summary:e.target.value})} style={{marginBottom:10}}/>
          {ch.beats.map(b=>(
            <div key={b.id} className="beat">
              <div className="row" style={{gap:8,alignItems:'flex-start'}}>
                <textarea rows={1} value={b.text} placeholder="What happens in this beat…" onChange={e=>updBeat(b.id,{text:e.target.value})} style={{background:'transparent',border:'none',padding:0,flex:1}}/>
                <span className="x" style={{fontSize:15}} onClick={()=>delBeat(b.id)}>×</span>
              </div>
              <BeatLinks beat={b} updBeat={updBeat} pd={pd} byId={byId}/>
            </div>
          ))}
          <div className="row" style={{gap:8}}>
            <button className="btn sm" onClick={addBeat}>＋ Beat</button>
            <button className="btn sm danger" onClick={()=>delCh(ch.id)}>Delete chapter</button>
          </div>
        </div>}
    </div>
  );
}
function BeatLinks({beat,updBeat,pd,byId}){
  const [pick,setPick]=useState(false);
  const linked=(beat.links||[]).map(id=>byId[id]).filter(Boolean);
  const toggle=id=>updBeat(beat.id,{links:(beat.links||[]).includes(id)?beat.links.filter(l=>l!==id):[...(beat.links||[]),id]});
  return (
    <div style={{marginTop:6}}>
      {linked.map(l=>{const T=ENTITY_TYPES[l.type];return <span key={l.id} className="tag"><span className="dot" style={{background:T.color,width:7,height:7,marginRight:4,display:'inline-block'}}/>{l.name}</span>;})}
      <span className="tag" style={{cursor:'pointer',borderStyle:'dashed'}} onClick={()=>setPick(p=>!p)}>＋ bind entity</span>
      {pick &&
        <div style={{marginTop:6,maxHeight:160,overflowY:'auto',border:'1px solid var(--hair2)',borderRadius:9,padding:6}}>
          {pd.entities.length===0 && <div className="hint" style={{padding:6}}>No codex entries yet.</div>}
          {pd.entities.map(o=>{const on=(beat.links||[]).includes(o.id);const T=ENTITY_TYPES[o.type];
            return <div key={o.id} onClick={()=>toggle(o.id)} style={{display:'flex',gap:8,alignItems:'center',padding:'5px 8px',borderRadius:7,cursor:'pointer',background:on?'rgba(var(--goldRGB),.08)':'transparent'}}>
              <span style={{width:13,color:'var(--gold2)',fontSize:11}}>{on?'✓':''}</span><span className="dot" style={{background:T.color}}/>{o.name||'(unnamed)'}</div>;})}
        </div>}
    </div>
  );
}

        {items.map(i=>(
          <div key={i.id} className="card">
            <div className="field"><label>Title</label>

                onChange={e=>upd(i.id,{title:e.target.value})}
                style={{fontFamily:'var(--disp)',fontSize:17,color:'var(--gold2)'}}/></div>
            <div className="field"><label>Seed — where it's planted</label>
              <textarea rows={2} value={i.setup} onChange={e=>upd(i.id,{setup:e.target.value})}/></div>
            <div className="field"><label>Escalation — how it grows</label>
              <textarea rows={2} value={i.escalation||''} placeholder="Each time it resurfaces, the stakes rise…"
                onChange={e=>upd(i.id,{escalation:e.target.value})}/></div>
            <div className="field"><label>Payoff — the harvest</label>
              <textarea rows={2} value={i.payoff} onChange={e=>upd(i.id,{payoff:e.target.value})}/></div>
            <div className="field"><label>Carryover — what survives into later books</label>
              <textarea rows={2} value={i.carryover||''} placeholder="Consequences, loose ends, or seeds this payoff plants for the next arc…"
                onChange={e=>upd(i.id,{carryover:e.target.value})}/></div>
            <div className="row" style={{gap:16}}>
              <label className="row" style={{gap:6,cursor:'pointer',fontSize:13.5}}><input type="checkbox" style={{width:'auto'}} checked={i.planted} onChange={e=>upd(i.id,{planted:e.target.checked})}/> Planted</label>
              <label className="row" style={{gap:6,cursor:'pointer',fontSize:13.5}}><input type="checkbox" style={{width:'auto'}} checked={i.paid} onChange={e=>upd(i.id,{paid:e.target.checked})}/> Paid off</label>
              <span className="x" style={{marginLeft:'auto'}} onClick={()=>del(i.id)}>×</span>
            </div>
            {i.planted&&!i.paid && <div className="chip" style={{color:'var(--gold)',borderColor:'rgba(var(--goldRGB),.5)',marginTop:10}}>open thread</div>}
            {i.planted&&i.paid && <div className="chip" style={{color:'#7cc6a0',borderColor:'rgba(124,198,160,.5)',marginTop:10}}>resolved</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ════════ CAPTURE ════════ */
function Capture({ctx}){
  const {pd,setPd}=ctx;
  const [t,setT]=useState('');
  const items=[...pd.braindump].sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
  const add=()=>{if(!t.trim())return;setPd({braindump:[...pd.braindump,{id:uid(),text:t.trim(),createdAt:now()}]});setT('');};

        {msgs.map((m,i)=>(
          <div key={i} className={'cmsg '+(m.role==='user'?'u':'a')}>

            <span style={{cursor:'pointer',marginLeft:7,opacity:.7}} onClick={()=>setAttach(null)}>×</span></span>

            ['Threads','Which foreshadowing threads does this chapter touch, pay off, or set up? What should it be seeding that it isn\'t?'],
            ['Summarise','Summarise what happens in this chapter and what changes by the end — state, relationships, stakes.']]
            .map(([l,pr])=>(

  );

/* ════════ IMPORT ════════ */
function chunkText(t,size){
  const paras=t.split(/\n\s*\n/);const out=[];let cur='';
  for(const p of paras){
    if((cur+'\n\n'+p).length>size){ if(cur)out.push(cur); cur=p; }
    else cur+=(cur?'\n\n':'')+p;
  }
  if(cur)out.push(cur);
  const re=new RegExp('[\\s\\S]{1,'+size+'}','g');
  return out.flatMap(c=>c.length>size?(c.match(re)||[c]):[c]);
}
function salvageJSON(raw){
  try{return JSON.parse(raw);}catch(e){}
  const start=raw.indexOf('[');
  if(start>=0){
    const last=raw.lastIndexOf('}');
    if(last>start){try{return JSON.parse('{"entities":'+raw.slice(start,last+1)+']}');}catch(e){}}
  }
  throw new Error('Unparseable JSON');
}
async function extractEntities(settings,text){
  const schema=Object.entries(ENTITY_TYPES).map(([k,T])=>`  "${k}": ${T.fields.join(', ')}`).join('\n');
  const prompt=`You extract story elements from fiction for a writer's world bible. Read the text and return every notable element.

Return ONLY valid JSON — no preamble, no markdown fences — in exactly this shape:
{"entities":[{"type":"...","name":"...","fields":{...},"notes":"1-2 sentence summary","tags":[],"links":["names of other elements this connects to"]}]}

Valid types and the fields to fill where the text supports them:
${schema}

Rules:
- Only include elements actually in the text. Never invent.
- Use each element's proper name; merge duplicates and aliases under one entry.
- Fill only fields the text supports; keep values concise.
- "links" must reference the NAMES of other elements you are also returning (e.g. a character's home location, the faction they serve).

TEXT:
"""${text}"""`;
  const data=await callClaude(settings,[{role:'user',content:prompt}],null,4000);
  const raw=data.content.filter(c=>c.type==='text').map(c=>c.text).join('').replace(/```json|```/g,'').trim();
  const parsed=salvageJSON(raw);
  return (parsed.entities||[]).filter(e=>e&&e.name&&ENTITY_TYPES[e.type]);
}
function mergeExtracted(all,incoming){
  const map={};all.forEach(e=>map[e.name.toLowerCase()]=e);
  incoming.forEach(e=>{
    const k=e.name.toLowerCase();
    if(map[k]){
      const ex=map[k];
      ex.fields={...(e.fields||{}),...(ex.fields||{})};
      if(!ex.notes&&e.notes)ex.notes=e.notes;
      ex.tags=[...new Set([...(ex.tags||[]),...(e.tags||[])])];
      ex.links=[...new Set([...(ex.links||[]),...(e.links||[])])];
    }else{map[k]=e;all.push(e);}
  });
  return all;
}
function ImportTab({ctx}){
  const {store,pd,setPd,flash}=ctx;
  const [text,setText]=useState('');
  const [fileName,setFileName]=useState('');
  const [busy,setBusy]=useState(false);
  const [progress,setProgress]=useState('');
  const [results,setResults]=useState(null);
  const fileRef=useRef();

  const onFile=async(e)=>{
    const f=e.target.files[0];if(!f)return;
    setFileName(f.name);setResults(null);
    try{
      if(f.name.toLowerCase().endsWith('.docx')){
        const buf=await f.arrayBuffer();
        const r=await window.mammoth.extractRawText({arrayBuffer:buf});
        setText(r.value);flash('Loaded '+f.name);
      }else{
        setText(await f.text());flash('Loaded '+f.name);
      }
    }catch(err){flash('Could not read that file');console.warn(err);}
  };
  const run=async()=>{
    if(!store.settings.apiKey){flash('Add your API key in Settings first');return;}
    if(!text.trim()){flash('Paste text or choose a file first');return;}
    setBusy(true);setResults(null);
    try{
      const chunks=chunkText(text,14000);
      let all=[];
      for(let i=0;i<chunks.length;i++){
        setProgress(`Reading section ${i+1} of ${chunks.length}…`);
        try{const ents=await extractEntities(store.settings,chunks[i]);all=mergeExtracted(all,ents);}
        catch(err){console.warn('chunk failed',err);}
      }
      const existing=new Set(pd.entities.map(e=>e.name.toLowerCase()));
      const rows=all.map(en=>({entity:en,dupe:existing.has((en.name||'').toLowerCase()),checked:!existing.has((en.name||'').toLowerCase())}));
      rows.sort((a,b)=>a.entity.type.localeCompare(b.entity.type));
      setResults(rows);setProgress('');
      if(rows.length===0)flash('No elements found in that text');
    }catch(err){flash('Extraction failed — check your key');console.warn(err);}
    setBusy(false);
  };
  const toggle=i=>setResults(rs=>rs.map((r,j)=>j===i?{...r,checked:!r.checked}:r));
  const setAll=v=>setResults(rs=>rs.map(r=>({...r,checked:v})));
  const doImport=()=>{
    const chosen=results.filter(r=>r.checked).map(r=>r.entity);
    if(chosen.length===0){flash('Nothing selected');return;}
    const norm=s=>(s||'').trim().toLowerCase();
    const existing={};pd.entities.forEach(e=>{existing[norm(e.name)]=e;});
    const fresh=[],merges=[];
    chosen.forEach(en=>{
      const hit=existing[norm(en.name)];
      if(hit)merges.push({hit,en});
      else{const ne={id:uid(),type:en.type,name:en.name,fields:en.fields||{},tags:en.tags||[],links:[],notes:en.notes||'',createdAt:now(),_src:en};
        fresh.push(ne);existing[norm(en.name)]=ne;}
    });
    const nameMap={};Object.values(existing).forEach(e=>{nameMap[norm(e.name)]=e.id;});
    const resolveLinks=(src,selfId)=>[...new Set((src.links||[]).map(n=>nameMap[norm(n)]).filter(id=>id&&id!==selfId))];
    fresh.forEach(e=>{e.links=resolveLinks(e._src,e.id);delete e._src;});
    let entities2=[...pd.entities,...fresh];
    merges.forEach(({hit,en})=>{
      entities2=entities2.map(e=>e.id!==hit.id?e:{...e,
        fields:{...(en.fields||{}),...Object.fromEntries(Object.entries(e.fields||{}).filter(([k,v])=>v))},
        tags:[...new Set([...(e.tags||[]),...(en.tags||[])])],
        links:[...new Set([...(e.links||[]),...resolveLinks(en,e.id)])],
        notes:e.notes?e.notes:(en.notes||'')});
    });
    setPd({entities:entities2});
    flash(`${fresh.length?`Added ${fresh.length}`:''}${fresh.length&&merges.length?' · ':''}${merges.length?`merged ${merges.length} into existing entries`:''}`||'Nothing to do');
    setResults(null);setText('');setFileName('');
  };
  const chosenCount=results?results.filter(r=>r.checked).length:0;

  return (
    <div>
      <p className="hint" style={{marginBottom:16}}>Feed in a chapter, manuscript or story bible. Scriptorium reads it and surfaces the characters, places, factions, items, lore and events — with the bonds between them — for your review before anything joins the Codex.</p>
      {!store.settings.apiKey &&
        <div className="card" style={{marginBottom:16,borderColor:'rgba(var(--goldRGB),.5)'}}>
          <b style={{color:'var(--gold2)'}}>Add your Anthropic API key</b> in Settings (⚿) — extraction reads through Claude.
        </div>}
      <div className="card" style={{marginBottom:18}}>
        <div className="row" style={{gap:10,marginBottom:12}}>
          <button className="btn" onClick={()=>fileRef.current.click()}>Choose file (.txt · .md · .docx)</button>
          {fileName && <span className="muted">{fileName}</span>}
          <input ref={fileRef} type="file" accept=".txt,.md,.markdown,.docx,text/plain" style={{display:'none'}} onChange={onFile}/>
        </div>
        <textarea rows={8} placeholder="…or paste your text here" value={text} onChange={e=>setText(e.target.value)}/>
        <div className="between" style={{marginTop:12}}>
          <span className="muted" style={{fontSize:13}}>{text?`${text.length.toLocaleString()} characters`:'No text yet'}</span>
          <button className="btn gold" onClick={run} disabled={busy||!text.trim()}>{busy?(progress||'Reading…'):'Extract elements'}</button>
        </div>
      </div>
      {busy && <div className="empty"><div className="dots"><span/><span/><span/></div><div style={{marginTop:12}}>{progress||'Reading the document…'}</div></div>}
      {results && results.length>0 && !busy &&
        <div>
          <div className="between" style={{marginBottom:12}}>
            <div className="h3" style={{fontSize:17}}>Found {results.length} element{results.length===1?'':'s'} · {chosenCount} selected</div>
            <div className="row" style={{gap:8}}>
              <button className="btn sm" onClick={()=>setAll(true)}>Select all</button>
              <button className="btn sm" onClick={()=>setAll(false)}>None</button>
            </div>
          </div>
          <div className="grid g2" style={{marginBottom:18}}>
            {results.map((r,i)=>{
              const T=ENTITY_TYPES[r.entity.type];
              return (
                <div key={i} className="card" style={{padding:14,cursor:'pointer',borderColor:r.checked?'rgba(var(--goldRGB),.5)':'var(--hair)',opacity:r.checked?1:.55}} onClick={()=>toggle(i)}>
                  <div className="row" style={{gap:9,alignItems:'flex-start'}}>
                    <span style={{color:r.checked?'var(--gold2)':'var(--faint)',fontSize:14,marginTop:2}}>{r.checked?'◉':'○'}</span>
                    <div style={{flex:1}}>
                      <div className="between">
                        <span className="chip" style={{color:T.color,borderColor:T.color+'55'}}>{T.g} {T.label}</span>
                        {r.dupe && <span className="chip" style={{color:'var(--ember)',borderColor:'rgba(207,107,78,.5)'}}>already in codex</span>}
                      </div>
                      <div style={{fontFamily:'var(--disp)',fontWeight:500,fontSize:18,margin:'6px 0 2px'}}>{r.entity.name}</div>
                      {r.entity.notes && <p className="muted" style={{fontSize:13.5}}>{r.entity.notes}</p>}
                      {(r.entity.links||[]).length>0 && <div className="hint" style={{marginTop:6}}>⟡ {r.entity.links.join(', ')}</div>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          <div className="row" style={{gap:10,justifyContent:'flex-end'}}>
            <button className="btn" onClick={()=>setResults(null)}>Discard</button>
            <button className="btn gold" onClick={doImport} disabled={chosenCount===0}>Add {chosenCount} to Codex</button>
          </div>
          <p className="hint" style={{marginTop:10}}>Duplicates start unticked. Ticking one adds a second entry — useful for a different character with the same name; otherwise leave it off.</p>
        </div>}
    </div>
  );
}

function Gallery({ctx}){
  const {pd,setPd,flash,proj,setTab,setJump}=ctx;
  const items=pd.gallery||[];
  const add=rec=>setPd({gallery:[...items,{id:rec.id,caption:''}]});
  const setCap=(id,caption)=>setPd({gallery:items.map(g=>g.id===id?{...g,caption}:g)});
  const del=(id)=>{idbDelete(id);imgCache.delete(id);setPd({gallery:items.filter(g=>g.id!==id)});};
  const [filter,setFilter]=useState('all');
  const [box,setBox]=useState(null);
  const sources=[];
  items.forEach(g=>sources.push({key:'g'+g.id,id:g.id,label:g.caption||'',src:'upload',g}));
  pd.entities.filter(e=>e.imageId).forEach(e=>{const T=ENTITY_TYPES[e.type];
    sources.push({key:'e'+e.id,id:e.imageId,label:e.name||'(unnamed)',src:'codex',color:T.color,glyph:T.g,
      go:()=>{setJump({type:'entity',id:e.id});setTab('codex');}});});
  pd.plot.acts.forEach(a=>a.chapters.forEach(ch=>(ch.imageIds||[]).forEach(iid=>
    sources.push({key:'c'+iid,id:iid,label:ch.title,src:'chapter',glyph:'❧',
      go:()=>{setJump({type:'chapter',id:ch.id});setTab('write');}}))));
  (pd.canvas||[]).forEach(b=>b.items.filter(i=>i.kind==='image'&&i.imageId).forEach(i=>
    sources.push({key:'b'+i.id,id:i.imageId,label:b.title,src:'board',glyph:'⌗',go:()=>setTab('board')})));
  if(proj.coverId)sources.push({key:'cover',id:proj.coverId,label:proj.name+' — cover',src:'cover',glyph:'✦'});
  const SRC={all:'All',upload:'Uploads',codex:'Codex',chapter:'Chapters',board:'Boards',cover:'Cover'};
  const counts={all:sources.length};sources.forEach(s=>{counts[s.src]=(counts[s.src]||0)+1;});
  const shown=sources.filter(s=>filter==='all'||s.src===filter);
  return (
    <div>
      <p className="hint" style={{marginBottom:14}}>Every image in this work, gathered — uploads, Codex portraits, chapter references, board pieces, and the cover. Click any to view it large.</p>
      <div style={{maxWidth:500,marginBottom:14}}><ImagePicker onAdd={add} flash={flash}/></div>
      <div className="row" style={{gap:6,marginBottom:16,flexWrap:'wrap'}}>
        {Object.entries(SRC).map(([k,l])=>(counts[k]||k==='all')?(
          <span key={k} className="lchip" onClick={()=>setFilter(k)}
            style={{cursor:'pointer',color:filter===k?'var(--gold2)':'var(--faint)',borderColor:filter===k?'var(--gold)':'var(--hair2)',background:'transparent'}}>
            {l}{counts[k]?` · ${counts[k]}`:''}</span>):null)}
      </div>
      {shown.length===0
        ? <div className="empty"><div className="glyph">▦</div>Nothing here yet.</div>
        : <div className="grid g3">{shown.map(s=><GalleryCard key={s.key} s={s} setCap={setCap} del={del} onView={()=>setBox({id:s.id,label:s.label})}/>)}</div>}
      {box && <Lightbox id={box.id} label={box.label} close={()=>setBox(null)}/>}
    </div>
  );
}

/* ════════ API ════════ */
async function callClaude(settings,messages,system,maxTokens){
  const body={model:settings.model||'claude-sonnet-4-6',max_tokens:maxTokens||1500,messages};
  if(system) body.system=system;
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':settings.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify(body)
  });
  if(!res.ok) throw new Error('API '+res.status);
  return res.json();
}

function Manuscript({ctx}){
  const {pd,setPd,flash,proj,setTab,jump,clearJump,setJump,store}=ctx;
  const acts=pd.plot.acts;
  const flat=[];acts.forEach(a=>a.chapters.forEach(ch=>flat.push({act:a,ch})));
  const ms=pd.manuscript||{};
  const [sel,setSel]=useState(()=>flat[0]?flat[0].ch.id:null);
  const [draft,setDraft]=useState(()=>{const f=flat[0];return f&&(pd.manuscript||{})[f.ch.id]?(pd.manuscript[f.ch.id].text||''):'';});
  const [focus,setFocus]=useState(false);
  const [refEnt,setRefEnt]=useState(null);
  const [sprint,setSprint]=useState(null);
  const [,setTick]=useState(0);

  const live=useRef({});
  live.current={sel,draft,ms,pd,setPd,flat};

  const commit=useCallback(()=>{
    const l=live.current;
    if(!l.sel)return;
    const cur=(l.ms[l.sel]||{}).text||'';
    if(l.draft===cur)return;
    try{
      const today=new Date().toISOString().slice(0,10);
      let map={};try{map=JSON.parse(localStorage.getItem('scriptorium.autosnap')||'{}');}catch(e){}
      if(map[l.sel]!==today){
        map[l.sel]=today;localStorage.setItem('scriptorium.autosnap',JSON.stringify(map));
        if(cur.trim())snapPut({id:uid(),chId:l.sel,text:cur,words:countWords(cur),at:now()})
          .then(async()=>{const all=await snapList(l.sel);for(const s of all.slice(6))await snapDel(s.id);}).catch(()=>{});
      }
    }catch(e){}
    l.setPd({manuscript:{...l.ms,[l.sel]:{text:l.draft,updated:now()}},lastTouched:{chId:l.sel,at:now()}});
  },[]);

  useEffect(()=>{const t=setTimeout(commit,600);return()=>clearTimeout(t);},[draft]);

  const editorRef=useRef();
  const [reading,setReading]=useState(false);
  const speak=()=>{
    if(reading){window.speechSynthesis.cancel();setReading(false);return;}
    const ta=editorRef.current;
    let text=draft;
    if(ta&&ta.selectionStart>0&&ta.selectionStart<draft.length-1)text=draft.slice(ta.selectionStart);
    if(!text.trim()){flash('Nothing to read yet');return;}
    const voices=window.speechSynthesis.getVoices();
    const v=voices.find(x=>/^en/.test(x.lang)&&/Samantha|Daniel|Karen|Serena|Moira/.test(x.name))||voices.find(x=>/^en/.test(x.lang));
    const parts=text.split(/\n+/).map(s=>s.trim()).filter(Boolean);
    let remaining=parts.length;
    window.speechSynthesis.cancel();
    parts.forEach(pt=>{
      const u=new SpeechSynthesisUtterance(pt);
      u.rate=.95;if(v)u.voice=v;
      u.onend=u.onerror=()=>{remaining--;if(remaining<=0)setReading(false);};
      window.speechSynthesis.speak(u);
    });
    setReading(true);
  };
  useEffect(()=>()=>window.speechSynthesis.cancel(),[]);

  const selectCh=id=>{
    window.speechSynthesis.cancel();setReading(false);
    commit();
    setSel(id);
    const m=(live.current.pd.manuscript||{})[id];
    setDraft(id===live.current.sel?live.current.draft:(m?m.text||'':''));
    setRefEnt(null);
  };

  useEffect(()=>{if(jump&&jump.type==='chapter'){selectCh(jump.id);clearJump();}},[jump]);

  const liveTotal=flat.reduce((a,f)=>a+(f.ch.id===sel?countWords(draft):countWords((ms[f.ch.id]||{}).text)),0);
  const base=useRef(null);
  useEffect(()=>{
    base.current=live.current.flat.reduce((a,f)=>a+(f.ch.id===live.current.sel?countWords(live.current.draft):countWords((live.current.ms[f.ch.id]||{}).text)),0);
    return ()=>{
      commit();
      const l=live.current;
      const tot=l.flat.reduce((a,f)=>a+(f.ch.id===l.sel?countWords(l.draft):countWords((l.ms[f.ch.id]||{}).text)),0);
      const d=tot-base.current;
      if(d>0)l.setPd({log:[...l.pd.log,{id:uid(),date:now(),words:d,note:'Manuscript session'}]});
    };
  },[]);
  const sessionDelta=base.current==null?0:liveTotal-base.current;

  useEffect(()=>{if(!sprint)return;
    const t=setInterval(()=>{
      setTick(x=>x+1);
      if(Date.now()>=sprint.end){
        const l=live.current;
        const tot=l.flat.reduce((a,f)=>a+(f.ch.id===l.sel?countWords(l.draft):countWords((l.ms[f.ch.id]||{}).text)),0);
        flash(`Sprint complete — ${Math.max(0,tot-sprint.startWords).toLocaleString()} words`);
        setSprint(null);
      }
    },1000);
    return()=>clearInterval(t);
  },[sprint]);
  const fmtSprint=()=>{if(!sprint)return '';const s=Math.max(0,Math.ceil((sprint.end-Date.now())/1000));return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;};
  const startSprint=m=>{setSprint({end:Date.now()+m*60000,startWords:liveTotal,mins:m});flash(`${m}-minute sprint begun`);};

  useEffect(()=>{if(!focus)return;const h=e=>{if(e.key==='Escape')setFocus(false);};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);},[focus]);

  const mentions=useMemo(()=>{
    if(!draft)return[];
    const low=draft.toLowerCase();
    return pd.entities.filter(e=>e.name&&e.name.length>2&&low.includes(e.name.toLowerCase())).slice(0,12);
  },[draft,pd.entities]);

  const compile=()=>{
    let out=`# ${proj.name}\n`;let n=0;
    acts.forEach(a=>{
      out+=`\n\n## ${a.title}\n`;
      a.chapters.forEach(ch=>{n++;
        const text=ch.id===sel?draft:((ms[ch.id]||{}).text||'');
        out+=`\n### ${n}. ${ch.title}\n\n${text}\n`;});
    });
    const blob=new Blob([out],{type:'text/markdown'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=`${(proj.name||'manuscript').replace(/[^\w\- ]+/g,'').trim().replace(/\s+/g,'-').toLowerCase()||'manuscript'}.md`;a.click();
    flash('Manuscript compiled to Markdown');
  };

  const [snaps,setSnaps]=useState(null);
  const [beatsBusy,setBeatsBusy]=useState(false);
  const [beatsReview,setBeatsReview]=useState(null);
  const extractBeats=async()=>{
    if(!store.settings.apiKey){flash('Add your API key in Settings first');return;}
    if(!draft.trim()){flash('Nothing written in this chapter yet');return;}
    commit();setBeatsBusy(true);
    try{
      const names=pd.entities.map(e=>e.name).filter(n=>n&&n.length>2).slice(0,120);
      const sys='You extract story beats from chapter prose. Respond ONLY with JSON, no markdown fences, in the form {"summary":"one or two sentence chapter summary","beats":[{"beat":"concise beat description","entities":["Name"]}]}. Give 5 to 12 beats in story order, each a single present-tense sentence. "entities" lists which of the known names are central to that beat (may be empty).';
      const usr=`KNOWN CODEX NAMES: ${names.join(', ')||'(none)'}\n\nCHAPTER: "${cur.ch.title}"\n---\n${draft.slice(0,60000)}\n---`;
      const data=await callClaude(store.settings,[{role:'user',content:usr}],sys,2500);
      const raw=(data.content||[]).map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
      const parsed=JSON.parse(raw);
      const nameToId={};pd.entities.forEach(e=>{nameToId[(e.name||'').toLowerCase()]=e.id;});
      const items=(parsed.beats||[]).map(b=>({
        text:(b.beat||'').trim(),
        links:[...new Set((b.entities||[]).map(n=>nameToId[(n||'').toLowerCase()]).filter(Boolean))],
        checked:true})).filter(b=>b.text);
      if(!items.length)throw new Error('no beats returned');
      setBeatsReview({summary:(parsed.summary||'').trim(),items,replace:false});
    }catch(err){console.warn(err);flash('Beat extraction failed — try again');}
    setBeatsBusy(false);
  };
  const applyBeats=()=>{
    const chosen=beatsReview.items.filter(i=>i.checked).map(i=>({id:uid(),text:i.text,links:i.links}));
    if(!chosen.length){setBeatsReview(null);return;}
    const patch={beats:beatsReview.replace?chosen:[...(cur.ch.beats||[]),...chosen]};
    if(beatsReview.summary&&!(cur.ch.summary||'').trim())patch.summary=beatsReview.summary;
    patchCh(sel,patch);
    flash(chosen.length+(chosen.length===1?' beat':' beats')+' added to “'+cur.ch.title+'”');
    setBeatsReview(null);
  };
  const [showPanel,setShowPanel]=useState(true);
  const [lightbox,setLightbox]=useState(null);
  const patchCh=(chId,patch)=>setPd({plot:{...pd.plot,acts:acts.map(a=>({...a,chapters:a.chapters.map(x=>x.id===chId?{...x,...patch}:x)}))}});
  const addChapter=actId=>{
    const chId=uid();
    setPd({plot:{...pd.plot,acts:acts.map(a=>a.id===actId?{...a,chapters:[...a.chapters,{id:chId,title:'Chapter '+(flat.length+1),summary:'',wordTarget:2500,status:'drafting',beats:[]}]}:a)}});
    selectCh(chId);setDraft('');
  };
  const addAct=()=>{
    setPd({plot:{...pd.plot,acts:[...acts,{id:uid(),title:'Act '+(acts.length+1),chapters:[]}]}});
  };
  const addChImages=async e=>{
    if(!sel)return;
    const files=[...e.target.files];e.target.value='';
    const ids=[];
    for(const f of files){try{const rec=await storeImageFile(f);ids.push(rec.id);}catch(err){flash('Could not add an image');}}
    if(ids.length){
      const cur=live.current.flat.find(x=>x.ch.id===sel);
      patchCh(sel,{imageIds:[...((cur&&cur.ch.imageIds)||[]),...ids]});
      flash(ids.length+(ids.length===1?' image added':' images added'));
    }
  };
  const delChImage=id=>{
    idbDelete(id);imgCache.delete(id);
    const cur2=flat.find(x=>x.ch.id===sel);
    patchCh(sel,{imageIds:((cur2&&cur2.ch.imageIds)||[]).filter(x=>x!==id)});
  };
  const openSnaps=async()=>{commit();try{setSnaps(await snapList(sel));}catch(e){flash('Snapshots unavailable');console.warn(e);}};
  const saveSnap=async()=>{
    try{
      await snapPut({id:uid(),chId:sel,text:draft,words:countWords(draft),at:now()});
      const all=await snapList(sel);
      for(const s of all.slice(6))await snapDel(s.id);
      setSnaps(await snapList(sel));flash('Snapshot saved');
    }catch(e){flash('Could not save snapshot');console.warn(e);}
  };
  const restoreSnap=async s=>{
    try{
      await snapPut({id:uid(),chId:sel,text:draft,words:countWords(draft),at:now()});
      setDraft(s.text);
      const all=await snapList(sel);
      for(const x of all.slice(6))await snapDel(x.id);
      setSnaps(null);flash('Snapshot restored — previous version was snapshotted too');
    }catch(e){flash('Could not restore');console.warn(e);}
  };
  const delSnap=async s=>{try{await snapDel(s.id);setSnaps(await snapList(sel));}catch(e){}};

  const quickStart=()=>{
    const chId=uid();
    setPd({plot:{...pd.plot,acts:[...acts,{id:uid(),title:'Act I',chapters:[{id:chId,title:'Chapter 1',summary:'',wordTarget:2500,status:'drafting',beats:[]}]}]}});

  if(flat.length===0) return (
    <div className="card" style={{padding:26,marginTop:26}}>
      <div className="h3" style={{marginBottom:8}}>The manuscript follows your Plot</div>
      <p className="muted" style={{maxWidth:560,marginBottom:18}}>Chapters you outline in Plot appear here as places to write — beats and structure there, prose here. Set up your acts first, or begin at once with a single chapter.</p>
      <div className="row">
        <button className="btn gold" onClick={quickStart}>Start Chapter 1</button>
        <button className="btn" onClick={()=>setTab('plot')}>Open Plot</button>
      </div>
    </div>
  );

  const cur=flat.find(f=>f.ch.id===sel);
  const wc=countWords(draft);
  const mkEditor=big=>(
    <textarea
      ref={big?null:editorRef}
      className={'mseditor'+(big?' big':'')}
      value={draft}
      placeholder="Begin…"
      onChange={e=>setDraft(e.target.value)}
      onKeyDown={e=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='s'){e.preventDefault();commit();flash('Saved');}}}
      spellCheck={true}
      autoFocus={big}
    />
  );

  return (
    <div className="msgrid">
      <aside className="mslist">
        {acts.map(a=>(
          <div key={a.id}>
            <div className="nsec" style={{padding:'12px 8px 5px'}}>{a.title}</div>
            {a.chapters.map(ch=>{
              const w=ch.id===sel?wc:countWords((ms[ch.id]||{}).text);

              return (
                <div key={ch.id} className={'msitem'+(on?' on':'')} onClick={()=>selectCh(ch.id)}>
                  <div className="between"><span className="ttl">{ch.title}</span><span className="wc">{w?w.toLocaleString():''}</span></div>
                  <div className="bar"><div style={{width:(pr*100)+'%'}}/></div>
                </div>
              );
            })}
            <div className="msadd" onClick={()=>addChapter(a.id)}>＋ chapter</div>
          </div>
        ))}
        <div className="msadd" style={{marginTop:8}} onClick={addAct}>＋ act</div>
        <div className="hint" style={{padding:'12px 8px',fontStyle:'normal'}}>Beats & reordering live in <span style={{color:'var(--gold)',cursor:'pointer'}} onClick={()=>setTab('plot')}>Plot</span>.</div>
      </aside>

      <section className="msmain">
        {cur ? <>
          <div className="between" style={{marginBottom:6,flexWrap:'wrap',gap:8}}>
            <div>
              <div style={{fontFamily:'var(--disp)',fontWeight:500,fontSize:24,color:'var(--gold2)'}}>{cur.ch.title}</div>
              <div className="hint" style={{fontStyle:'normal',fontFamily:'var(--mono)',fontSize:10,letterSpacing:1}}>
                {wc.toLocaleString()} words{cur.ch.wordTarget?` · target ${(+cur.ch.wordTarget).toLocaleString()}`:''}{sessionDelta>0?` · +${sessionDelta.toLocaleString()} this session`:''}{draft===((ms[sel]||{}).text||'')?<span style={{color:'var(--gold)'}}> · saved</span>:<span style={{opacity:.6}}> · saving…</span>}
              </div>
            </div>
            <div className="row" style={{gap:6}}>
              {sprint
                ? <span className="chip sprint">◍ {fmtSprint()} · +{Math.max(0,liveTotal-sprint.startWords)}</span>

              <button className="btn sm" onClick={speak} title={reading?'Stop reading':'Read this chapter aloud (from the cursor, if placed) — hearing prose catches what eyes miss'} style={reading?{color:'var(--gold2)',borderColor:'var(--gold)'}:null}>{reading?'◼ Stop':'▷ Read'}</button>
              <button className="btn sm" onClick={()=>setShowPanel(v=>!v)} title="Notes, images & codex for this chapter" style={showPanel?{color:'var(--gold2)',borderColor:'var(--gold)'}:null}>▤ Panel</button>
              <button className="btn sm" onClick={()=>setFocus(true)} title="Distraction-free writing (Esc to leave)">⛶ Focus</button>
              <button className="btn sm" onClick={()=>{commit();setJump({type:'discuss',id:sel});setTab('ai');}} title="Send this chapter to the Companion">✧ Discuss</button>
              <button className="btn sm" disabled={beatsBusy} onClick={extractBeats} title="Read this chapter and extract its beats into the Plot tab">{beatsBusy?'✦ Reading…':'✦ Beats'}</button>
              <button className="btn sm" onClick={openSnaps} title="Save & restore versions of this chapter">⌑ Snapshots</button>
              <button className="btn sm" onClick={compile} title="Download the full manuscript as Markdown">⇓ Compile</button>
            </div>
          </div>
          {mentions.length>0 &&
            <div className="row" style={{gap:6,flexWrap:'wrap',marginBottom:8}}>
              {mentions.map(e=>{const T=ENTITY_TYPES[e.type];return (
                <span key={e.id} className="tag" style={{cursor:'pointer',borderColor:refEnt&&refEnt.id===e.id?T.color:'var(--hair2)'}} onClick={()=>{setShowPanel(true);setRefEnt(refEnt&&refEnt.id===e.id?null:e);}}>
                  <span className="dot" style={{background:T.color,width:7,height:7,marginRight:5,display:'inline-block'}}/>{e.name}
                </span>);})}
            </div>}
          {mkEditor(false)}
        </> : <div className="empty"><div className="glyph">❧</div>Select a chapter to write.</div>}
      </section>

      {showPanel && cur && (refEnt
        ? (()=>{const e=pd.entities.find(x=>x.id===refEnt.id)||refEnt;const T=ENTITY_TYPES[e.type];return (
          <aside className="msref">
            <div className="between" style={{marginBottom:10}}>
              <span className="chip" style={{cursor:'pointer'}} onClick={()=>setRefEnt(null)}>‹ Chapter</span>
              <span className="x" onClick={()=>setRefEnt(null)}>×</span>
            </div>
            <span className="chip" style={{color:T.color,borderColor:T.color+'55'}}>{T.g} {T.label}</span>
            <div style={{fontFamily:'var(--disp)',fontWeight:500,fontSize:21,margin:'10px 0 8px'}}>{e.name}</div>
            {T.fields.map(f=>e.fields&&e.fields[f]?<div key={f} className="field" style={{marginBottom:8}}><label>{FIELD_LABELS[f]}</label><p style={{fontSize:13.5,color:'var(--dim)',lineHeight:1.5}}>{e.fields[f]}</p></div>:null)}
            {e.notes && <p className="muted" style={{fontSize:13.5}}>{e.notes}</p>}
            <button className="btn sm" style={{marginTop:12}} onClick={()=>{setJump({type:'entity',id:e.id});setTab('codex');}}>Open in Codex</button>
          </aside>);})()
        : <ChapterPanel cur={cur} draft={draft} pd={pd} patchCh={patchCh} mentions={mentions}
            onPickEnt={setRefEnt} addImages={addChImages} delImage={delChImage} onView={setLightbox}
            close={()=>setShowPanel(false)}/>)}

      {lightbox && <Lightbox id={lightbox} close={()=>setLightbox(null)}/>}

      {beatsReview &&
        <div className="scrim" onClick={()=>setBeatsReview(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="mhead"><h3>Beats found in “{cur?cur.ch.title:''}”</h3><span className="x" onClick={()=>setBeatsReview(null)}>×</span></div>
            <div className="mbody">
              {beatsReview.summary && !(cur&&(cur.ch.summary||'').trim()) &&
                <p className="hint" style={{margin:'0 0 12px'}}>The chapter summary will also be filled: “{beatsReview.summary}”</p>}
              {beatsReview.items.map((b,i)=>(
                <label key={i} className="row" style={{gap:10,alignItems:'flex-start',padding:'9px 12px',background:'rgba(255,255,255,.02)',border:'1px solid var(--hair)',borderRadius:10,marginBottom:7,cursor:'pointer'}}>
                  <input type="checkbox" style={{width:'auto',marginTop:3}} checked={b.checked}
                    onChange={e=>setBeatsReview(r=>({...r,items:r.items.map((x,xi)=>xi===i?{...x,checked:e.target.checked}:x)}))}/>
                  <span style={{fontSize:13.5,lineHeight:1.5}}>
                    {b.text}
                    {b.links.length>0 &&
                      <span style={{display:'block',marginTop:4}}>
                        {b.links.map(id=>{const e2=pd.entities.find(x=>x.id===id);if(!e2)return null;const T=ENTITY_TYPES[e2.type];
                          return <span key={id} className="tag" style={{fontSize:10,padding:'1px 8px',marginRight:4,borderColor:T.color+'44'}}>
                            <span className="dot" style={{background:T.color,width:5,height:5,marginRight:4,display:'inline-block'}}/>{e2.name}</span>;})}
                      </span>}
                  </span>
                </label>
              ))}
              {(cur&&(cur.ch.beats||[]).length>0) &&
                <label className="row" style={{gap:8,cursor:'pointer',fontSize:13.5,color:'var(--dim)',margin:'6px 0 10px'}}>
                  <input type="checkbox" style={{width:'auto'}} checked={beatsReview.replace}
                    onChange={e=>setBeatsReview(r=>({...r,replace:e.target.checked}))}/>
                  Replace the {(cur.ch.beats||[]).length} existing beat{(cur.ch.beats||[]).length===1?'':'s'} (otherwise these append)
                </label>}
              <button className="btn gold" style={{width:'100%'}} onClick={applyBeats}>
                Add {beatsReview.items.filter(i=>i.checked).length} beat{beatsReview.items.filter(i=>i.checked).length===1?'':'s'} to Plot
              </button>
            </div>
          </div>
        </div>}

      {snaps!==null &&
        <div className="scrim" onClick={()=>setSnaps(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="mhead"><h3>Chapter snapshots</h3><span className="x" onClick={()=>setSnaps(null)}>×</span></div>
            <div className="mbody">
              <p className="hint" style={{margin:'0 0 12px'}}>Frozen versions of “{cur?cur.ch.title:''}”, kept on this device. The six most recent are retained.</p>
              <button className="btn gold" style={{width:'100%',marginBottom:14}} onClick={saveSnap}>⌑ Snapshot current version ({wc.toLocaleString()} words)</button>
              {snaps.length===0 && <div className="hint" style={{padding:'6px 0'}}>No snapshots yet for this chapter.</div>}
              {snaps.map(s=>(
                <div key={s.id} className="between" style={{padding:'9px 12px',background:'rgba(255,255,255,.02)',border:'1px solid var(--hair)',borderRadius:10,marginBottom:8}}>
                  <div className="row" style={{gap:12}}>
                    <span style={{fontFamily:'var(--disp)',fontWeight:500,fontSize:16,color:'var(--gold2)'}}>{(+s.words).toLocaleString()} w</span>
                    <span className="muted" style={{fontSize:12.5}}>{new Date(s.at).toLocaleString()}</span>
                  </div>
                  <div className="row" style={{gap:6}}>
                    <button className="btn sm" onClick={()=>restoreSnap(s)}>Restore</button>
                    <span className="x" onClick={()=>delSnap(s)}>×</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>}

      {focus &&
        <div className="msfocus">
          <div className="inner">
            <div className="between" style={{marginBottom:14}}>
              <span className="hint" style={{fontFamily:'var(--mono)',fontStyle:'normal',fontSize:10,letterSpacing:2,textTransform:'uppercase'}}>{cur?cur.ch.title:''}</span>
              <span className="hint" style={{fontFamily:'var(--mono)',fontStyle:'normal',fontSize:10}}>
                {wc.toLocaleString()} w{sprint?` · ${fmtSprint()}`:''} · esc to leave
              </span>
            </div>
            {mkEditor(true)}
          </div>
        </div>}
    </div>
  );
}





/* ════════ v8: BOARD — visual planner ════════ */
const BD_COLORS=['#c9a35c','#cf6b4e','#5fa8a0','#a9b78e','#8f9fc9','#ded7c2'];
const cub=(a,b1,c1,d1,t)=>{const u=1-t;return u*u*u*a+3*u*u*t*b1+3*u*t*t*c1+t*t*t*d1;};
function BoardImage({id,w}){
  const url=useImageURL(id);
  return url?<img src={url} alt="" draggable={false}/>:<div style={{width:'100%',height:90}}/>;
}
function Board({ctx}){
  const {pd,setPd,flash,setJump,setTab}=ctx;
  const boards=pd.canvas||[];
  const [bid,setBid]=useState(boards[0]?boards[0].id:null);
  useEffect(()=>{if(bid&&!boards.find(b=>b.id===bid))setBid(boards[0]?boards[0].id:null);
    if(!bid&&boards[0])setBid(boards[0].id);},[boards]);
  const board=boards.find(b=>b.id===bid);
  const [view,setView]=useState({x:80,y:70,k:1});
  const [selIds,setSelIds]=useState([]);
  const selIdsRef=useRef(selIds);selIdsRef.current=selIds;
  const [selLink,setSelLink]=useState(null);
  const [marq,setMarq]=useState(null);
  const marqRef=useRef(null);marqRef.current=marq;
  const [connectFrom,setConnectFrom]=useState(null);
  const [connectMode,setConnectMode]=useState(false);
  const [editing,setEditing]=useState(null);
  const [entPick,setEntPick]=useState(false);
  const [live,setLive]=useState(null); // {ids,dx,dy,gx,gy} move · {id,w} resize
  const [,tick]=useState(0);
  const wrapRef=useRef();const fileRef=useRef();const drag=useRef(null);
  const hMap=useRef({});const nodeMap=useRef({});
  const liveRef=useRef(null);liveRef.current=live;
  const boardsRef=useRef(boards);boardsRef.current=boards;
  const bidRef=useRef(bid);bidRef.current=bid;
  const viewRef=useRef(view);viewRef.current=view;

  const patchBoard=patch=>setPd({canvas:boardsRef.current.map(b=>b.id===bidRef.current?{...b,...patch}:b)});
  const curBoard=()=>boardsRef.current.find(b=>b.id===bidRef.current);
  const patchItem=(id,patch)=>{const b=curBoard();if(b)patchBoard({items:b.items.map(it=>it.id===id?{...it,...patch}:it)});};

  const addBoard=()=>{const b={id:uid(),title:'Board '+(boards.length+1),items:[],links:[]};setPd({canvas:[...boards,b]});setBid(b.id);};
  const renameBoard=t=>patchBoard({title:t});
  const delBoard=()=>{if(!board)return;if(board.items.length&&!confirm('Delete this board and everything on it?'))return;setPd({canvas:boards.filter(b=>b.id!==bid)});};

  const centerWorld=()=>{const r=wrapRef.current.getBoundingClientRect();return {x:(r.width/2-view.x)/view.k,y:(r.height/2-view.y)/view.k};};
  const addItem=(kind,extra)=>{
    if(!board){flash('Make a board first');return;}
    const cw=centerWorld();
    const defW={note:230,label:280,image:240,entity:200}[kind];
    const it={id:uid(),kind,x:Math.round(cw.x-defW/2+(Math.random()*50-25)),y:Math.round(cw.y-50+(Math.random()*50-25)),w:defW,title:'',text:'',size:34,...extra};
    patchBoard({items:[...board.items,it]});
    setSelIds([it.id]);
    if(kind==='note'||kind==='label')setEditing(it.id);
  };
  const addImages=async e=>{
    const files=[...e.target.files];e.target.value='';
    for(const f of files){try{const rec=await storeImageFile(f);addItem('image',{imageId:rec.id});}catch(err){flash('Could not add an image');}}
  };
  const delItems=ids=>{const b=curBoard();patchBoard({items:b.items.filter(i=>!ids.includes(i.id)),links:(b.links||[]).filter(l=>!ids.includes(l.from)&&!ids.includes(l.to))});setSelIds([]);setEditing(null);};
  const delItem=id=>delItems([id]);
  const delLink=id=>{const b=curBoard();patchBoard({links:(b.links||[]).filter(l=>l.id!==id)});setSelLink(null);};
  const patchLink=(id,patch)=>{const b=curBoard();patchBoard({links:(b.links||[]).map(l=>l.id===id?{...l,...patch}:l)});};

  const itemPos=it=>{
    const l=liveRef.current;
    let x=it.x,y=it.y,w=it.w;
    if(l){
      if(l.ids&&l.ids.includes(it.id)){x=Math.round(it.x+l.dx);y=Math.round(it.y+l.dy);}
      if(l.id===it.id&&l.w!=null)w=l.w;
    }
    return {x,y,w,h:hMap.current[it.id]||60};
  };

  /* measure heights after each render so links anchor correctly */
  useEffect(()=>{
    let changed=false;
    Object.entries(nodeMap.current).forEach(([id,el])=>{
      if(el){const h=el.offsetHeight;if(Math.abs((hMap.current[id]||0)-h)>2){hMap.current[id]=h;changed=true;}}
    });
    if(changed)tick(x=>x+1);
  });

  /* wheel zoom (non-passive) */
  useEffect(()=>{
    const el=wrapRef.current;if(!el)return;
    const onWheel=e=>{
      e.preventDefault();
      const v=viewRef.current;
      const r=el.getBoundingClientRect();
      const mx=e.clientX-r.left,my=e.clientY-r.top;
      const k=Math.max(.25,Math.min(2.4,v.k*(e.deltaY<0?1.1:1/1.1)));
      setView({k,x:mx-(mx-v.x)*(k/v.k),y:my-(my-v.y)*(k/v.k)});
    };
    el.addEventListener('wheel',onWheel,{passive:false});
    return()=>el.removeEventListener('wheel',onWheel);
  },[]);

  /* drag machinery */
  useEffect(()=>{
    const move=e=>{
      const d=drag.current;if(!d)return;
      if(d.type==='pan'){setView({...d.v0,x:d.v0.x+(e.clientX-d.sx),y:d.v0.y+(e.clientY-d.sy)});}
      else if(d.type==='item'){
        const v=viewRef.current;
        let dx=(e.clientX-d.sx)/v.k, dy=(e.clientY-d.sy)/v.k;
        let gx=null,gy=null;
        if(!e.altKey){
          const b=curBoard();const tol=7/v.k;
          const prim=b&&b.items.find(i=>i.id===d.primary);
          if(prim){
            const w=prim.w||200,h=hMap.current[prim.id]||60;
            const nx=prim.x+dx,ny=prim.y+dy;
            const candX=[nx,nx+w/2,nx+w],candY=[ny,ny+h/2,ny+h];
            let bestX=null,bestY=null;
            b.items.filter(i=>!d.ids.includes(i.id)).forEach(o=>{
              const ow=o.w||200,oh=hMap.current[o.id]||60;
              [o.x,o.x+ow/2,o.x+ow].forEach(ox=>candX.forEach(cx=>{const diff=ox-cx;
                if(Math.abs(diff)<tol&&(bestX==null||Math.abs(diff)<Math.abs(bestX.diff)))bestX={diff,line:ox};}));
              [o.y,o.y+oh/2,o.y+oh].forEach(oy=>candY.forEach(cy=>{const diff=oy-cy;
                if(Math.abs(diff)<tol&&(bestY==null||Math.abs(diff)<Math.abs(bestY.diff)))bestY={diff,line:oy};}));
            });
            if(bestX){dx+=bestX.diff;gx=bestX.line;}
            if(bestY){dy+=bestY.diff;gy=bestY.line;}
          }
        }
        setLive({ids:d.ids,dx,dy,gx,gy});
      }
      else if(d.type==='marquee'){
        const v=viewRef.current;const r=wrapRef.current.getBoundingClientRect();
        const wx=(e.clientX-r.left-v.x)/v.k,wy=(e.clientY-r.top-v.y)/v.k;
        setMarq({x1:d.wx,y1:d.wy,x2:wx,y2:wy});
      }
      else if(d.type==='resize'){
        const v=viewRef.current;
        setLive({id:d.id,w:Math.max(90,Math.round(d.w0+(e.clientX-d.sx)/v.k))});
      }
    };
    const up=()=>{
      const d=drag.current;drag.current=null;
      const l=liveRef.current;
      if(d&&d.type==='item'&&l&&l.ids&&(Math.abs(l.dx)>.5||Math.abs(l.dy)>.5)){
        const b=curBoard();
        if(b)patchBoard({items:b.items.map(it=>l.ids.includes(it.id)?{...it,x:Math.round(it.x+l.dx),y:Math.round(it.y+l.dy)}:it)});
      }
      else if(d&&d.type==='resize'&&l&&l.w!=null)patchItem(d.id,{w:l.w});
      else if(d&&d.type==='marquee'&&marqRef.current){
        const m=marqRef.current;
        const x1=Math.min(m.x1,m.x2),x2=Math.max(m.x1,m.x2),y1=Math.min(m.y1,m.y2),y2=Math.max(m.y1,m.y2);
        const b=curBoard();
        if(b){
          const ids=b.items.filter(i=>{const w=i.w||200,h=hMap.current[i.id]||60;
            return i.x<x2&&i.x+w>x1&&i.y<y2&&i.y+h>y1;}).map(i=>i.id);
          setSelIds(ids);
        }
      }
      setLive(null);setMarq(null);
      document.body.style.cursor='';
    };
    window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
    return()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
  },[]);

  const bgDown=e=>{
    if(e.target.closest('.bditem')||e.target.closest('.bdpop'))return;
    setSelLink(null);setEditing(null);
    if(connectMode){setConnectFrom(null);}
    if(e.shiftKey){
      const r=wrapRef.current.getBoundingClientRect();
      const wx=(e.clientX-r.left-view.x)/view.k,wy=(e.clientY-r.top-view.y)/view.k;
      drag.current={type:'marquee',wx,wy};
      setMarq({x1:wx,y1:wy,x2:wx,y2:wy});
      return;
    }
    setSelIds([]);
    drag.current={type:'pan',sx:e.clientX,sy:e.clientY,v0:{...view}};
  };
  const itemDown=(e,it)=>{
    e.stopPropagation();
    if(connectMode){
      if(!connectFrom){setConnectFrom(it.id);flash('Now click the destination');}
      else if(connectFrom!==it.id){
        patchBoard({links:[...(board.links||[]),{id:uid(),from:connectFrom,to:it.id,style:'dotted',label:''}]});
        setConnectFrom(null);setConnectMode(false);
      }
      return;
    }
    const mates=it.groupId?board.items.filter(i=>i.groupId===it.groupId).map(i=>i.id):[it.id];
    let next;
    if(e.shiftKey)next=selIds.includes(it.id)?selIds.filter(x=>!mates.includes(x)):[...new Set([...selIds,...mates])];
    else next=selIds.includes(it.id)?selIds:mates;
    setSelIds(next);setSelLink(null);
    if(editing===it.id)return;
    drag.current={type:'item',ids:next.length?next:mates,primary:it.id,sx:e.clientX,sy:e.clientY};
  };
  const handleDown=(e,it)=>{e.stopPropagation();setSelIds([it.id]);drag.current={type:'resize',id:it.id,sx:e.clientX,sy:e.clientY,w0:it.w};};

  /* delete / escape keys */
  useEffect(()=>{
    const h=e=>{
      const tag=(document.activeElement&&document.activeElement.tagName)||'';
      if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;
      if(e.key==='Escape'){setConnectMode(false);setConnectFrom(null);setSelIds([]);setSelLink(null);setEditing(null);}

        if(selLink){e.preventDefault();delLink(selLink);}
        else if(selIds.length){e.preventDefault();delItems(selIds);}
      }
    };
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[selIds,selLink]);

  const fit=()=>{
    if(!board||!board.items.length)return;
    const r=wrapRef.current.getBoundingClientRect();
    const xs1=board.items.map(i=>i.x),ys1=board.items.map(i=>i.y);
    const xs2=board.items.map(i=>i.x+(i.w||200)),ys2=board.items.map(i=>i.y+(hMap.current[i.id]||120));
    const minX=Math.min(...xs1)-60,maxX=Math.max(...xs2)+60,minY=Math.min(...ys1)-60,maxY=Math.max(...ys2)+60;
    const k=Math.max(.25,Math.min(1.4,Math.min(r.width/(maxX-minX),r.height/(maxY-minY))));
    setView({k,x:(r.width-(maxX+minX)*k)/2,y:(r.height-(maxY+minY)*k)/2});
  };

  const entById=id=>pd.entities.find(e=>e.id===id);
  const selOne=selIds.length===1?selIds[0]:null;
  const selItem=board&&board.items.find(i=>i.id===selOne);

  if(!board)return (
    <div className="card" style={{padding:26,marginTop:26}}>

      <button className="btn gold" onClick={addBoard}>Create the first board</button>
    </div>
  );

  return (
    <div>
      <div className="bdbar">

        <button className="btn sm" onClick={addBoard} title="New board">＋ Board</button>
        <span style={{width:10}}/>
        <button className="btn sm" onClick={()=>addItem('note')}>▤ Note</button>
        <button className="btn sm" onClick={()=>addItem('label')}>Ａ Label</button>
        <button className="btn sm" onClick={()=>fileRef.current.click()}>▦ Image</button>
        <button className="btn sm" onClick={()=>setEntPick(v=>!v)} style={entPick?{color:'var(--gold2)',borderColor:'var(--gold)'}:null}>❖ Codex</button>
        <button className="btn sm" onClick={()=>{setConnectMode(v=>!v);setConnectFrom(null);}} style={connectMode?{color:'var(--gold2)',borderColor:'var(--gold)'}:null} title="Click one item, then another, to draw a connection">⤳ Connect</button>
        <span style={{flex:1}}/>
        <button className="btn sm" onClick={fit}>Fit</button>
        <button className="btn sm danger" onClick={delBoard} title="Delete this board">✕</button>
        <input ref={fileRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={addImages}/>
      </div>
      {connectMode && <p className="hint" style={{margin:'0 0 8px'}}>{connectFrom?'Click the destination item…':'Click the item the connection starts from…'}</p>}
      {entPick &&
        <div className="row" style={{gap:6,flexWrap:'wrap',margin:'0 0 10px'}}>

            </span>);})}
        </div>}

      <div ref={wrapRef} className={'bdwrap'+(drag.current&&drag.current.type==='pan'?' panning':'')} onMouseDown={bgDown}>
        <div style={{position:'absolute',inset:0,transformOrigin:'0 0',transform:`translate(${view.x}px,${view.y}px) scale(${view.k})`}}>
          <svg style={{position:'absolute',left:-5000,top:-5000,width:10000,height:10000,overflow:'visible',pointerEvents:'none'}}>
            <g transform="translate(5000,5000)">
              {(board.links||[]).map(l=>{
                const A=board.items.find(i=>i.id===l.from),B=board.items.find(i=>i.id===l.to);
                if(!A||!B)return null;
                const pa=itemPos(A),pb=itemPos(B);
                const ax=pa.x+pa.w/2,ay=pa.y+pa.h/2,bx=pb.x+pb.w/2,by=pb.y+pb.h/2;
                const on=selLink===l.id;
                const d=Math.hypot(bx-ax,by-ay)||1;
                const ux=(bx-ax)/d,uy=(by-ay)/d;

                const c2x=ex-ux*d*.3+px*bow,c2y=ey-uy*d*.3+py*bow;
                const path=`M ${ax} ${ay} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${ex} ${ey}`;
                const td=Math.hypot(ex-c2x,ey-c2y)||1;const tx=(ex-c2x)/td,ty=(ey-c2y)/td;

          {marq&&(()=>{const x=Math.min(marq.x1,marq.x2),y=Math.min(marq.y1,marq.y2),w=Math.abs(marq.x2-marq.x1),h=Math.abs(marq.y2-marq.y1);

            </div>
            <div className="row" style={{gap:6}}>
              <button className="btn sm" onClick={()=>patchLink(selLinkObj.id,{style:selLinkObj.style==='solid'?'dotted':'solid'})}>
                {selLinkObj.style==='solid'?'Make dotted':'Make solid'}</button>
              <button className="btn sm danger" onClick={()=>delLink(selLinkObj.id)}>Remove</button>
            </div>
          </div>}
        {!selLinkObj && selIds.length>1 && (()=>{
          const selected=board.items.filter(i=>selIds.includes(i.id));
          const gid=selected[0]&&selected[0].groupId;
          const grouped=!!gid&&selected.every(i=>i.groupId===gid)&&board.items.filter(i=>i.groupId===gid).length===selected.length;
          return (
          <div className="bdpop" onMouseDown={e=>e.stopPropagation()}>
            <div className="row" style={{gap:6,flexWrap:'wrap'}}>
              <span className="chip">{selIds.length} selected</span>
              {grouped
                ? <button className="btn sm" onClick={()=>patchBoard({items:board.items.map(i=>selIds.includes(i.id)?{...i,groupId:null}:i)})}>Ungroup</button>
                : <button className="btn gold sm" onClick={()=>{const g=uid();patchBoard({items:board.items.map(i=>selIds.includes(i.id)?{...i,groupId:g}:i)});}}>⧉ Group</button>}
              <button className="btn sm danger" onClick={()=>delItems(selIds)}>Delete all</button>
            </div>
            <p className="hint" style={{margin:'8px 0 0'}}>Grouped pieces select and move as one.</p>

        {selItem && !selLinkObj &&

              {selItem.kind==='label' && <>
                <button className="btn sm" onClick={()=>patchItem(selItem.id,{size:Math.min(72,(selItem.size||34)+6)})}>A＋</button>

              </>}
              {selItem.kind==='note' && <>
                {[['card','Card'],['postit','Post-it'],['index','Index']].map(([v,l])=>(

                {selItem.variant==='postit' && ['#d8c47a','#a9b78e','#c79b8a','#93a7b4'].map(pc=>(
                  <span key={pc} onClick={()=>patchItem(selItem.id,{pc})}
                    style={{width:18,height:18,borderRadius:5,background:pc,cursor:'pointer',flexShrink:0,border:(selItem.pc||'#d8c47a')===pc?'2px solid var(--gold2)':'1px solid rgba(0,0,0,.4)'}}/>))}
              </>}
              {selItem.kind==='image' && [['plain','Plain'],['stamp','Stamp'],['polaroid','Polaroid'],['taped','Taped']].map(([v,l])=>(
                <button key={v} className="btn sm" style={(selItem.variant||'plain')===v?{color:'var(--gold2)',borderColor:'var(--gold)'}:null}

              <span className="hint" style={{fontStyle:'normal',fontSize:11,width:'100%'}}>Glow
                <span onClick={()=>patchItem(selItem.id,{glow:null})}
                  style={{display:'inline-block',verticalAlign:'middle',marginLeft:8,marginRight:4,width:18,height:18,borderRadius:5,background:'transparent',cursor:'pointer',border:!selItem.glow?'2px solid var(--gold2)':'1px solid var(--hair2)'}} title="No glow"/>
                {BD_COLORS.map(cl=>(
                  <span key={cl} onClick={()=>patchItem(selItem.id,{glow:cl})}
                    style={{display:'inline-block',verticalAlign:'middle',marginRight:4,width:18,height:18,borderRadius:5,background:cl,cursor:'pointer',boxShadow:selItem.glow===cl?`0 0 10px ${cl}`:'none',border:selItem.glow===cl?'2px solid var(--gold2)':'1px solid rgba(0,0,0,.4)'}}/>))}
              </span>
              {(selItem.kind==='note'||selItem.kind==='label') && [[null,'Serif'],['hand','Hand'],['type','Type'],['mono','Mono']].map(([v,l])=>(
                <button key={l} className="btn sm" style={(selItem.font||null)===v?{color:'var(--gold2)',borderColor:'var(--gold)'}:null}
                  onClick={()=>patchItem(selItem.id,{font:v})}>{l}</button>))}
              <button className="btn sm" onClick={()=>{setConnectMode(true);setConnectFrom(selItem.id);flash('Now click the destination');}}>⤳ Connect from here</button>
              <button className="btn sm danger" onClick={()=>delItem(selItem.id)}>Delete</button>
            </div>
            {selItem.kind==='image'&&selItem.variant==='polaroid'&&
              <div className="field" style={{margin:'8px 0 0'}}><label>Caption</label>
                <input value={selItem.text||''} onChange={e=>patchItem(selItem.id,{text:e.target.value})} placeholder="Scrawl beneath…"/></div>}
            <p className="hint" style={{margin:'8px 0 0'}}>Drag to move · ⇧drag the ground selects several · ⌥drag skips snapping · ⌫ deletes</p>
          </div>}
      </div>
    </div>
  );

function BoardEntFace({ent,color}){
  const url=useImageURL(ent.imageId);
  if(url)return <img src={url} alt="" draggable={false} style={{border:'1.5px solid '+color}}/>;
  return <div className="ini" style={{color,border:'1.5px solid '+color}}>{(ent.name||'·').charAt(0).toUpperCase()}</div>;
}

/* ════════ v7: RHYTHM ════════ */
function timeAgo(iso){
  const s=(Date.now()-Date.parse(iso))/1000;
  if(isNaN(s))return '';
  if(s<90)return 'just now';
  const m=s/60;if(m<90)return Math.round(m)+' min ago';
  const h=m/60;if(h<36)return Math.round(h)+' hr ago';
  const d=h/24;if(d<14)return Math.round(d)+' days ago';
  return new Date(iso).toLocaleDateString();
}
function Heatmap({log}){
  const by={};log.forEach(l=>{const d=(l.date||'').slice(0,10);by[d]=(by[d]||0)+(+l.words||0);});
  const days=[];
  const end=new Date();end.setHours(12,0,0,0);
  const start=new Date(end);start.setDate(start.getDate()-364);
  while(start.getDay()!==1)start.setDate(start.getDate()-1);
  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
    const k=d.toISOString().slice(0,10);
    days.push({k,w:by[k]||0});
  }
  const lvl=w=>w===0?0:w<300?1:w<800?2:w<1600?3:4;
  const alpha=[0,.16,.34,.58,.9];
  return (
    <div style={{marginTop:14}}>
      <div className="hint" style={{fontStyle:'normal',fontFamily:'var(--mono)',fontSize:9,letterSpacing:1.8,textTransform:'uppercase',marginBottom:8}}>The last year</div>
      <div className="heat">
        {days.map(d=>(
          <div key={d.k} className="hcell" title={`${d.k} — ${d.w.toLocaleString()} words`}
            style={d.w?{background:`rgba(var(--goldRGB),${alpha[lvl(d.w)]})`,boxShadow:lvl(d.w)>2?`0 0 5px rgba(var(--goldRGB),.5)`:'none'}:null}/>
        ))}
      </div>
    </div>
  );
}
function PaceCard({proj,store,upd,msWords,log}){
  const g=proj.goal;
  const [edit,setEdit]=useState(false);
  const [w,setW]=useState(g?g.words:120000);
  const [dt,setDt]=useState(g?g.date:'');
  const save=()=>{if(!(+w)||!dt)return;upd({...store,projects:store.projects.map(x=>x.id===proj.id?{...x,goal:{words:+w,date:dt}}:x)});setEdit(false);};
  const clear=()=>{upd({...store,projects:store.projects.map(x=>x.id===proj.id?{...x,goal:null}:x)});setEdit(false);};
  const trailing=(()=>{
    const cut=Date.now()-14*86400000;
    const s=log.filter(l=>Date.parse(l.date)>=cut).reduce((a,l)=>a+(+l.words||0),0);
    return Math.round(s/14);
  })();
  if(edit)return (
    <div className="row" style={{gap:8,flexWrap:'wrap',alignItems:'flex-end'}}>
      <div className="field" style={{margin:0}}><label>Target words</label><input type="number" value={w} onChange={e=>setW(e.target.value)} style={{width:120}}/></div>
      <div className="field" style={{margin:0}}><label>By</label><input type="date" value={dt} onChange={e=>setDt(e.target.value)} style={{width:160}}/></div>
      <button className="btn gold sm" onClick={save}>Set</button>
      {g && <button className="btn sm" onClick={clear}>Clear</button>}
      <button className="btn sm ghost" onClick={()=>setEdit(false)}>Cancel</button>
    </div>
  );
  if(!g)return (
    <div className="between" style={{flexWrap:'wrap',gap:8}}>
      <span className="muted" style={{fontSize:13.5}}>Trailing pace: <b style={{color:'var(--gold2)'}}>{trailing.toLocaleString()}</b> words/day over the last fortnight.</span>
      <button className="btn sm" onClick={()=>setEdit(true)}>Set a target & deadline</button>
    </div>
  );
  const days=Math.max(1,Math.ceil((Date.parse(g.date)-Date.now())/86400000));
  const remain=Math.max(0,g.words-msWords);
  const need=Math.ceil(remain/days);
  const done=remain===0;
  const ahead=trailing>=need;
  return (
    <div>
      <div className="between" style={{flexWrap:'wrap',gap:8,marginBottom:10}}>
        <span style={{fontFamily:'var(--disp)',fontWeight:500,fontSize:17,color:done?'var(--gold2)':ahead?'var(--gold2)':'var(--ember)'}}>
          {done?'Target reached':ahead?'On pace':'Behind pace'}
        </span>
        <span className="hint" style={{fontStyle:'normal',cursor:'pointer',color:'var(--gold)'}} onClick={()=>setEdit(true)}>adjust ›</span>
      </div>
      {!done &&
        <div className="grid g4" style={{gap:10}}>
          {[[remain.toLocaleString(),'words remain'],[days.toLocaleString(),days===1?'day left':'days left'],[need.toLocaleString(),'needed / day'],[trailing.toLocaleString(),'trailing / day']].map(([n,l],i)=>(
            <div key={i}><div style={{fontFamily:'var(--disp)',fontWeight:500,fontSize:21,color:'var(--gold2)'}}>{n}</div><div className="hint" style={{fontStyle:'normal',fontSize:10.5}}>{l}</div></div>
          ))}
        </div>}
      {done && <p className="muted" style={{fontSize:13.5,margin:0}}>{g.words.toLocaleString()} words by {new Date(g.date).toLocaleDateString()} — met. Set the next mountain when ready.</p>}
    </div>
  );
}

            {ents.map(e=>{
              const linkedHere=[...new Set([...(e.links||[]),...pd.entities.filter(o=>(o.links||[]).includes(e.id)).map(o=>o.id)])]

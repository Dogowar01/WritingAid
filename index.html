function Manuscript({ctx}){
  const {pd,setPd,flash,proj,setTab,jump,clearJump,setJump}=ctx;
  const acts=pd.plot.acts;
  const flat=[];acts.forEach(a=>a.chapters.forEach(ch=>flat.push({act:a,ch})));
  const ms=pd.manuscript||{};
  const [sel,setSel]=useState(()=>flat[0]?flat[0].ch.id:null);
  const [draft,setDraft]=useState(()=>{const f=flat[0];return f&&(pd.manuscript||{})[f.ch.id]?(pd.manuscript[f.ch.id].text||''):'';});
  const [focus,setFocus]=useState(false);
  const [refEnt,setRefEnt]=useState(null);
  const [sprint,setSprint]=useState(null);
  const [,setTick]=useState(0);

  const live=useRef({});
  live.current={sel,draft,ms,pd,setPd,flat};

  const commit=useCallback(()=>{
    const l=live.current;
    if(!l.sel)return;
    const cur=(l.ms[l.sel]||{}).text||'';
    if(l.draft!==cur)l.setPd({manuscript:{...l.ms,[l.sel]:{text:l.draft,updated:now()}}});
  },[]);

  useEffect(()=>{const t=setTimeout(commit,600);return()=>clearTimeout(t);},[draft]);

  const selectCh=id=>{
    commit();
    setSel(id);
    const m=(live.current.pd.manuscript||{})[id];
    setDraft(id===live.current.sel?live.current.draft:(m?m.text||'':''));
    setRefEnt(null);
  };

  useEffect(()=>{if(jump&&jump.type==='chapter'){selectCh(jump.id);clearJump();}},[jump]);

  const liveTotal=flat.reduce((a,f)=>a+(f.ch.id===sel?countWords(draft):countWords((ms[f.ch.id]||{}).text)),0);
  const base=useRef(null);
  useEffect(()=>{
    base.current=live.current.flat.reduce((a,f)=>a+(f.ch.id===live.current.sel?countWords(live.current.draft):countWords((live.current.ms[f.ch.id]||{}).text)),0);
    return ()=>{
      commit();
      const l=live.current;
      const tot=l.flat.reduce((a,f)=>a+(f.ch.id===l.sel?countWords(l.draft):countWords((l.ms[f.ch.id]||{}).text)),0);
      const d=tot-base.current;
      if(d>0)l.setPd({log:[...l.pd.log,{id:uid(),date:now(),words:d,note:'Manuscript session'}]});
    };
  },[]);
  const sessionDelta=base.current==null?0:liveTotal-base.current;

  useEffect(()=>{if(!sprint)return;
    const t=setInterval(()=>{
      setTick(x=>x+1);
      if(Date.now()>=sprint.end){
        const l=live.current;
        const tot=l.flat.reduce((a,f)=>a+(f.ch.id===l.sel?countWords(l.draft):countWords((l.ms[f.ch.id]||{}).text)),0);
        flash(`Sprint complete вҖ” ${Math.max(0,tot-sprint.startWords).toLocaleString()} words`);
        setSprint(null);
      }
    },1000);
    return()=>clearInterval(t);
  },[sprint]);
  const fmtSprint=()=>{if(!sprint)return '';const s=Math.max(0,Math.ceil((sprint.end-Date.now())/1000));return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;};
  const startSprint=m=>{setSprint({end:Date.now()+m*60000,startWords:liveTotal,mins:m});flash(`${m}-minute sprint begun`);};

  useEffect(()=>{if(!focus)return;const h=e=>{if(e.key==='Escape')setFocus(false);};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);},[focus]);

  const mentions=useMemo(()=>{
    if(!draft)return[];
    const low=draft.toLowerCase();
    return pd.entities.filter(e=>e.name&&e.name.length>2&&low.includes(e.name.toLowerCase())).slice(0,12);
  },[draft,pd.entities]);

  const compile=()=>{
    let out=`# ${proj.name}\n`;let n=0;
    acts.forEach(a=>{
      out+=`\n\n## ${a.title}\n`;
      a.chapters.forEach(ch=>{n++;
        const text=ch.id===sel?draft:((ms[ch.id]||{}).text||'');
        out+=`\n### ${n}. ${ch.title}\n\n${text}\n`;});
    });
    const blob=new Blob([out],{type:'text/markdown'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=`${(proj.name||'manuscript').replace(/[^\w\- ]+/g,'').trim().replace(/\s+/g,'-').toLowerCase()||'manuscript'}.md`;a.click();
    flash('Manuscript compiled to Markdown');
  };

  const [snaps,setSnaps]=useState(null);
  const openSnaps=async()=>{commit();try{setSnaps(await snapList(sel));}catch(e){flash('Snapshots unavailable');console.warn(e);}};
  const saveSnap=async()=>{
    try{
      await snapPut({id:uid(),chId:sel,text:draft,words:countWords(draft),at:now()});
      const all=await snapList(sel);
      for(const s of all.slice(6))await snapDel(s.id);
      setSnaps(await snapList(sel));flash('Snapshot saved');
    }catch(e){flash('Could not save snapshot');console.warn(e);}
  };
  const restoreSnap=async s=>{
    try{
      await snapPut({id:uid(),chId:sel,text:draft,words:countWords(draft),at:now()});
      setDraft(s.text);
      const all=await snapList(sel);
      for(const x of all.slice(6))await snapDel(x.id);
      setSnaps(null);flash('Snapshot restored вҖ” previous version was snapshotted too');
    }catch(e){flash('Could not restore');console.warn(e);}
  };
  const delSnap=async s=>{try{await snapDel(s.id);setSnaps(await snapList(sel));}catch(e){}};

  const quickStart=()=>{
    const chId=uid();
    setPd({plot:{...pd.plot,acts:[...acts,{id:uid(),title:'Act I',chapters:[{id:chId,title:'Chapter 1',summary:'',wordTarget:2500,status:'drafting',beats:[]}]}]}});
    setSel(chId);setDraft('');
  };

  if(flat.length===0) return (
    <div className="card" style={{padding:26,marginTop:26}}>
      <div className="h3" style={{marginBottom:8}}>The manuscript follows your Plot</div>
      <p className="muted" style={{maxWidth:560,marginBottom:18}}>Chapters you outline in Plot appear here as places to write вҖ” beats and structure there, prose here. Set up your acts first, or begin at once with a single chapter.</p>
      <div className="row">
        <button className="btn gold" onClick={quickStart}>Start Chapter 1</button>
        <button className="btn" onClick={()=>setTab('plot')}>Open Plot</button>
      </div>
    </div>
  );

  const cur=flat.find(f=>f.ch.id===sel);
  const wc=countWords(draft);
  const mkEditor=big=>(
    <textarea
      className={'mseditor'+(big?' big':'')}
      value={draft}
      placeholder="BeginвҖҰ"
      onChange={e=>setDraft(e.target.value)}
      onKeyDown={e=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='s'){e.preventDefault();commit();flash('Saved');}}}
      spellCheck={true}
      autoFocus={big}
    />
  );

  return (
    <div className="msgrid">
      <aside className="mslist">
        {acts.map(a=>(
          <div key={a.id}>
            <div className="nsec" style={{padding:'12px 8px 5px'}}>{a.title}</div>
            {a.chapters.map(ch=>{
              const w=ch.id===sel?wc:countWords((ms[ch.id]||{}).text);
              const on=ch.id===sel;
              const pr=ch.wordTarget?Math.min(1,w/ch.wordTarget):0;
              return (
                <div key={ch.id} className={'msitem'+(on?' on':'')} onClick={()=>selectCh(ch.id)}>
                  <div className="between"><span className="ttl">{ch.title}</span><span className="wc">{w?w.toLocaleString():''}</span></div>
                  <div className="bar"><div style={{width:(pr*100)+'%'}}/></div>
                </div>
              );
            })}
          </div>
        ))}
        <div className="hint" style={{padding:'12px 8px',fontStyle:'normal'}}>Chapters are managed in <span style={{color:'var(--gold)',cursor:'pointer'}} onClick={()=>setTab('plot')}>Plot</span>.</div>
      </aside>

      <section className="msmain">
        {cur ? <>
          <div className="between" style={{marginBottom:6,flexWrap:'wrap',gap:8}}>
            <div>
              <div style={{fontFamily:'var(--disp)',fontWeight:500,fontSize:24,color:'var(--gold2)'}}>{cur.ch.title}</div>
              <div className="hint" style={{fontStyle:'normal',fontFamily:'var(--mono)',fontSize:10,letterSpacing:1}}>
                {wc.toLocaleString()} words{cur.ch.wordTarget?` В· target ${(+cur.ch.wordTarget).toLocaleString()}`:''}{sessionDelta>0?` В· +${sessionDelta.toLocaleString()} this session`:''}
              </div>
            </div>
            <div className="row" style={{gap:6}}>
              {sprint
                ? <span className="chip sprint">в—Қ {fmtSprint()} В· +{Math.max(0,liveTotal-sprint.startWords)}</span>
                : [15,25,45].map(m=><button key={m} className="btn sm" title={`${m}-minute sprint`} onClick={()=>startSprint(m)}>{m}вҖІ</button>)}
              <button className="btn sm" onClick={()=>setFocus(true)} title="Distraction-free writing (Esc to leave)">вӣ¶ Focus</button>
              <button className="btn sm" onClick={()=>{commit();setJump({type:'discuss',id:sel});setTab('ai');}} title="Send this chapter to the Companion">вң§ Discuss</button>
              <button className="btn sm" onClick={openSnaps} title="Save & restore versions of this chapter">вҢ‘ Snapshots</button>
              <button className="btn sm" onClick={compile} title="Download the full manuscript as Markdown">вҮ“ Compile</button>
            </div>
          </div>
          {mentions.length>0 &&
            <div className="row" style={{gap:6,flexWrap:'wrap',marginBottom:8}}>
              {mentions.map(e=>{const T=ENTITY_TYPES[e.type];return (
                <span key={e.id} className="tag" style={{cursor:'pointer',borderColor:refEnt&&refEnt.id===e.id?T.color:'var(--hair2)'}} onClick={()=>setRefEnt(refEnt&&refEnt.id===e.id?null:e)}>
                  <span className="dot" style={{background:T.color,width:7,height:7,marginRight:5,display:'inline-block'}}/>{e.name}
                </span>);})}
            </div>}
          {mkEditor(false)}
        </> : <div className="empty"><div className="glyph">вқ§</div>Select a chapter to write.</div>}
      </section>

      {refEnt && (()=>{const e=pd.entities.find(x=>x.id===refEnt.id)||refEnt;const T=ENTITY_TYPES[e.type];return (
        <aside className="msref">
          <div className="between" style={{marginBottom:10}}>
            <span className="chip" style={{color:T.color,borderColor:T.color+'55'}}>{T.g} {T.label}</span>
            <span className="x" onClick={()=>setRefEnt(null)}>Г—</span>
          </div>
          <div style={{fontFamily:'var(--disp)',fontWeight:500,fontSize:21,marginBottom:8}}>{e.name}</div>
          {T.fields.map(f=>e.fields&&e.fields[f]?<div key={f} className="field" style={{marginBottom:8}}><label>{FIELD_LABELS[f]}</label><p style={{fontSize:13.5,color:'var(--dim)',lineHeight:1.5}}>{e.fields[f]}</p></div>:null)}
          {e.notes && <p className="muted" style={{fontSize:13.5}}>{e.notes}</p>}
          <button className="btn sm" style={{marginTop:12}} onClick={()=>{setJump({type:'entity',id:e.id});setTab('codex');}}>Open in Codex</button>
        </aside>);})()}

      {snaps!==null &&
        <div className="scrim" onClick={()=>setSnaps(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="mhead"><h3>Chapter snapshots</h3><span className="x" onClick={()=>setSnaps(null)}>Г—</span></div>
            <div className="mbody">
              <p className="hint" style={{margin:'0 0 12px'}}>Frozen versions of вҖң{cur?cur.ch.title:''}вҖқ, kept on this device. The six most recent are retained.</p>
              <button className="btn gold" style={{width:'100%',marginBottom:14}} onClick={saveSnap}>вҢ‘ Snapshot current version ({wc.toLocaleString()} words)</button>
              {snaps.length===0 && <div className="hint" style={{padding:'6px 0'}}>No snapshots yet for this chapter.</div>}
              {snaps.map(s=>(
                <div key={s.id} className="between" style={{padding:'9px 12px',background:'rgba(255,255,255,.02)',border:'1px solid var(--hair)',borderRadius:10,marginBottom:8}}>
                  <div className="row" style={{gap:12}}>
                    <span style={{fontFamily:'var(--disp)',fontWeight:500,fontSize:16,color:'var(--gold2)'}}>{(+s.words).toLocaleString()} w</span>
                    <span className="muted" style={{fontSize:12.5}}>{new Date(s.at).toLocaleString()}</span>
                  </div>
                  <div className="row" style={{gap:6}}>
                    <button className="btn sm" onClick={()=>restoreSnap(s)}>Restore</button>
                    <span className="x" onClick={()=>delSnap(s)}>Г—</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>}

      {focus &&
        <div className="msfocus">
          <div className="inner">
            <div className="between" style={{marginBottom:14}}>
              <span className="hint" style={{fontFamily:'var(--mono)',fontStyle:'normal',fontSize:10,letterSpacing:2,textTransform:'uppercase'}}>{cur?cur.ch.title:''}</span>
              <span className="hint" style={{fontFamily:'var(--mono)',fontStyle:'normal',fontSize:10}}>
                {wc.toLocaleString()} w{sprint?` В· ${fmtSprint()}`:''} В· esc to leave
              </span>
            </div>
            {mkEditor(true)}
          </div>
        </div>}
    </div>
  );
}


/* в•җв•җв•җв•җв•җв•җв•җв•җ v5: SNAPSHOTS / THEME / RENAME в•җв•җв•җв•җв•җв•җв•җв•җ */
async function snapPut(rec){const db=await idb();return new Promise((res,rej)=>{const t=db.transaction('snapshots','readwrite');t.objectStore('snapshots').put(rec);t.oncomplete=()=>res(rec);t.onerror=()=>rej(t.error);});}
async function snapList(chId){const db=await idb();return new Promise((res,rej)=>{const t=db.transaction('snapshots','readonly');const q=t.objectStore('snapshots').getAll();q.onsuccess=()=>res((q.result||[]).filter(s=>s.chId===chId).sort((a,b)=>b.at.localeCompare(a.at)));q.onerror=()=>rej(q.error);});}
async function snapDel(id){const db=await idb();return new Promise((res,rej)=>{const t=db.transaction('snapshots','readwrite');t.objectStore('snapshots').delete(id);t.oncomplete=()=>res();t.onerror=()=>rej(t.error);});}

function hsl2rgb(h,s,l){s/=100;l/=100;const k=n=>(n+h/30)%12;const a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  return [Math.round(f(0)*255),Math.round(f(8)*255),Math.round(f(4)*255)];}
async function themeFromImage(dataUrl){
  try{
    const img=await loadImageEl(dataUrl);
    const S=48,cv=document.createElement('canvas');cv.width=S;cv.height=S;
    const g=cv.getContext('2d');g.drawImage(img,0,0,S,S);
    const d=g.getImageData(0,0,S,S).data;
    const buckets={};
    for(let i=0;i<d.length;i+=4){
      const r=d[i]/255,gr=d[i+1]/255,b=d[i+2]/255;
      const mx=Math.max(r,gr,b),mn=Math.min(r,gr,b),l=(mx+mn)/2,df=mx-mn;
      if(df<.02)continue;
      const s=df/(1-Math.abs(2*l-1));
      if(s<.22||l<.14||l>.86)continue;
      let h;
      if(mx===r)h=60*(((gr-b)/df)%6);else if(mx===gr)h=60*((b-r)/df+2);else h=60*((r-gr)/df+4);
      h=(h+360)%360;
      const k=Math.round(h/15)*15%360;
      const bk=buckets[k]=buckets[k]||{n:0,s:0};bk.n++;bk.s+=s;
    }
    const ranked=Object.entries(buckets).sort((x,y)=>(y[1].n*(y[1].s/y[1].n))-(x[1].n*(x[1].s/x[1].n)));
    if(!ranked.length)return null;
    const h=+ranked[0][0];
    const [r1,g1,b1]=hsl2rgb(h,50,60);
    const [r2,g2,b2]=hsl2rgb(h,56,76);
    const hex=(r,g,b)=>'#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
    return {a:hex(r1,g1,b1),b:hex(r2,g2,b2),rgb:`${r1},${g1},${b1}`};
  }catch(e){console.warn('theme extraction failed',e);return null;}
}

const RENAME_SKIP=new Set(['id','imageId','coverId','type','status','date','updated','at','createdAt','links','positions','board','apiKey','model','theme']);
function deepRename(obj,re,to){
  if(typeof obj==='string')return obj.replace(re,to);
  if(Array.isArray(obj))return obj.map(v=>deepRename(v,re,to));
  if(obj&&typeof obj==='object'){const o={};for(const [k,v] of Object.entries(obj)){o[k]=RENAME_SKIP.has(k)?v:deepRename(v,re,to);}return o;}
  return obj;
}
function deepCount(obj,re){
  if(typeof obj==='string'){const m=obj.match(re);return m?m.length:0;}
  if(Array.isArray(obj))return obj.reduce((a,v)=>a+deepCount(v,re),0);
  if(obj&&typeof obj==='object')return Object.entries(obj).reduce((a,[k,v])=>a+(RENAME_SKIP.has(k)?0:deepCount(v,re)),0);
  return 0;
}
function RenameModal({ent,ctx,close}){
  const {pd,setPd,flash}=ctx;
  const [from,setFrom]=useState(ent.name||'');
  const [to,setTo]=useState('');
  const [mc,setMc]=useState(true);
  const re=useMemo(()=>{
    const f=from.trim();if(!f)return null;
    try{return new RegExp('\\b'+f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b',mc?'g':'gi');}catch{return null;}
  },[from,mc]);
  const buckets=useMemo(()=>{
    if(!re)return [];
    return [
      ['Manuscript prose',deepCount(pd.manuscript||{},re)],
      ['Plot вҖ” acts, chapters, beats',deepCount(pd.plot,re)],
      ['Codex entries',deepCount(pd.entities,re)],
      ['Threads',deepCount(pd.foreshadow,re)],
      ['Captures',deepCount(pd.braindump,re)],
      ['System screens',deepCount(pd.screens,re)],
      ['Gallery & log notes',deepCount(pd.gallery||[],re)+deepCount(pd.log,re)],
    ].filter(b=>b[1]>0);
  },[re,pd]);
  const total=buckets.reduce((a,b)=>a+b[1],0);
  const apply=()=>{
    if(!re||!to.trim()||total===0)return;
    const t=to.trim();
    setPd({
      manuscript:deepRename(pd.manuscript||{},re,t),
      plot:deepRename(pd.plot,re,t),
      entities:deepRename(pd.entities,re,t),
      foreshadow:deepRename(pd.foreshadow,re,t),
      braindump:deepRename(pd.braindump,re,t),
      screens:deepRename(pd.screens,re,t),
      gallery:deepRename(pd.gallery||[],re,t),
      log:deepRename(pd.log,re,t),
    });
    flash(`Renamed ${total.toLocaleString()} occurrence${total===1?'':'s'}`);
    close();
  };
  return (
    <div className="scrim" onClick={close}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="mhead"><h3>Rename across the book</h3><span className="x" onClick={close}>Г—</span></div>
        <div className="mbody">
          <div className="field"><label>Find (whole word)</label>
            <input value={from} onChange={e=>setFrom(e.target.value)}/></div>
          <div className="field"><label>Replace with</label>
            <input value={to} onChange={e=>setTo(e.target.value)} placeholder="New nameвҖҰ"/></div>
          <label className="row" style={{gap:8,cursor:'pointer',marginBottom:14,fontSize:13.5,color:'var(--dim)'}}>
            <input type="checkbox" checked={mc} onChange={e=>setMc(e.target.checked)} style={{width:'auto'}}/>Match case
          </label>
          {re && (buckets.length>0
            ? <div style={{marginBottom:14}}>
                {buckets.map(([l,n])=>(
                  <div key={l} className="between" style={{padding:'7px 12px',background:'rgba(255,255,255,.02)',border:'1px solid var(--hair)',borderRadius:9,marginBottom:6}}>
                    <span className="muted" style={{fontSize:13.5}}>{l}</span>
                    <span style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--gold2)'}}>{n.toLocaleString()}</span>
                  </div>
                ))}
                <div className="hint" style={{marginTop:8}}>{total.toLocaleString()} occurrence{total===1?'':'s'} will change. There is no undo вҖ” a backup or chapter snapshot first is wise.</div>
              </div>
            : <div className="hint" style={{marginBottom:14}}>No occurrences of вҖң{from.trim()}вҖқ found.</div>)}
          <button className="btn gold" style={{width:'100%'}} disabled={!re||!to.trim()||total===0} onClick={apply}>
            Rename {total>0?total.toLocaleString():''} occurrence{total===1?'':'s'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җ v4: COMMAND PALETTE в•җв•җв•җв•җв•җв•җв•җв•җ */
function CmdPalette({ctx,close}){
  const {pd,setTab,setJump}=ctx;
  const [q,setQ]=useState('');
  const [ix,setIx]=useState(0);
  const inputRef=useRef();
  useEffect(()=>{inputRef.current&&inputRef.current.focus();},[]);
  const items=useMemo(()=>{
    const s=q.trim().toLowerCase();
    const out=[];
    TABS.forEach(t=>{if(!s||t.lbl.toLowerCase().includes(s))out.push({k:'tab:'+t.id,g:t.g,label:t.lbl,sub:'Go to',act:()=>setTab(t.id)});});
    if(s){
      pd.entities.filter(e=>(e.name||'').toLowerCase().includes(s)||(e.notes||'').toLowerCase().includes(s)||(e.tags||[]).some(t=>t.toLowerCase().includes(s))).slice(0,8)
        .forEach(e=>{const T=ENTITY_TYPES[e.type];out.push({k:'ent:'+e.id,g:T.g,color:T.color,label:e.name||'(unnamed)',sub:T.label,act:()=>{setJump({type:'entity',id:e.id});setTab('codex');}});});
      pd.plot.acts.forEach(a=>a.chapters.filter(ch=>(ch.title||'').toLowerCase().includes(s)||(ch.summary||'').toLowerCase().includes(s)).forEach(ch=>{
        out.push({k:'ch:'+ch.id,g:'вқ§',label:ch.title,sub:a.title,act:()=>{setJump({type:'chapter',id:ch.id});setTab('write');}});}));
      pd.braindump.filter(b=>(b.text||'').toLowerCase().includes(s)).slice(0,4)
        .forEach(b=>out.push({k:'cap:'+b.id,g:'вңҺ',label:(b.text||'').slice(0,64),sub:'Capture',act:()=>setTab('capture')}));
      pd.foreshadow.filter(f=>((f.setup||'')+' '+(f.payoff||'')).toLowerCase().includes(s)).slice(0,4)
        .forEach(f=>out.push({k:'th:'+f.id,g:'вҢҮ',label:(f.setup||'(unwritten)').slice(0,64),sub:'Thread',act:()=>setTab('threads')}));
    }
    return out.slice(0,14);
  },[q,pd]);
  useEffect(()=>{setIx(0);},[q]);
  const go=it=>{if(!it)return;it.act();close();};
  return (
    <div className="scrim" style={{alignItems:'flex-start',paddingTop:'13vh'}} onClick={close}>
      <div className="palette" onClick={e=>e.stopPropagation()}>
        <input ref={inputRef} value={q} placeholder="Search chapters, codex, capturesвҖҰ or jump to a tab"
          onChange={e=>setQ(e.target.value)}
          onKeyDown={e=>{
            if(e.key==='ArrowDown'){e.preventDefault();setIx(i=>Math.min(items.length-1,i+1));}
            else if(e.key==='ArrowUp'){e.preventDefault();setIx(i=>Math.max(0,i-1));}
            else if(e.key==='Enter'){e.preventDefault();go(items[ix]);}
            else if(e.key==='Escape'){close();}
          }}/>
        <div className="plist">
          {items.length===0 && <div className="hint" style={{padding:'12px 14px'}}>Nothing matches.</div>}
          {items.map((it,i)=>(
            <div key={it.k} className={'pitem'+(i===ix?' on':'')} onMouseEnter={()=>setIx(i)} onClick={()=>go(it)}>
              <span className="g" style={it.color?{color:it.color}:null}>{it.g}</span>
              <span className="lbl">{it.label}</span>
              <span className="sub">{it.sub}</span>
            </div>
          ))}
        </div>
        <div className="pfoot"><span>вҶ‘вҶ“ navigate В· вҶө open В· esc close</span><span>вҢҳK</span></div>
      </div>
    </div>
  );
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0b10" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Scriptorium" />
<title>Scriptorium — Writing Studio</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/png" href="favicon.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Caveat:wght@500;600&family=Special+Elite&family=Spectral:ital,wght@0,300;0,400;0,500;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script>Babel.registerPreset('react-classic',{presets:[[Babel.availablePresets['react'],{runtime:'classic'}]]});</script>
<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
<style>
:root{
  --void:#0a0b10; --deep:#0e1018; --raise:#12141e; --raise2:#171a26;
  --hair:rgba(220,200,150,.10); --hair2:rgba(220,200,150,.18);
  --txt:#e9e2d0; --dim:#a59c86; --faint:#6e675a;
  --gold:#c9a35c; --gold2:#eed598; --goldRGB:201,163,92; --ember:#cf6b4e;
  --char:#e09a62; --loc:#7cc6a0; --fac:#b88bd6; --item:#e3c884; --lore:#7fa6e0; --event:#e0705c;
  --shadow:0 18px 50px rgba(0,0,0,.55);
  --disp:'Fraunces',serif; --body:'Spectral',Georgia,serif; --mono:'JetBrains Mono',monospace;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--void);
  color:var(--txt); font-family:var(--body); font-size:15.5px; line-height:1.55;
  overflow:hidden; font-weight:300;
}
#root{height:100vh;height:100dvh}
::selection{background:rgba(var(--goldRGB),.28)}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#232632;border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:#2e3242}
b,strong{font-weight:500;color:var(--txt)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ── shell ── */
.app{display:flex;height:100%}
.rail{width:218px;min-width:218px;display:flex;flex-direction:column;border-right:1px solid var(--hair);background:linear-gradient(180deg,var(--deep),var(--void))}
.brand{padding:22px 20px 16px}
.brand h1{font-family:var(--disp);font-weight:500;font-size:25px;letter-spacing:.4px;color:var(--gold2);line-height:1}
.brand h1 .star{color:var(--gold);font-size:15px;vertical-align:.18em;margin-right:7px}
.brand .sub{font-family:var(--mono);font-size:8.5px;letter-spacing:3px;color:var(--faint);text-transform:uppercase;margin-top:7px}
.proj{padding:0 14px 14px;border-bottom:1px solid var(--hair)}
.proj label{font-family:var(--mono);font-size:8.5px;letter-spacing:2px;color:var(--faint);text-transform:uppercase;display:block;margin:0 6px 6px}
.proj-row{display:flex;gap:6px}
select,input,textarea{font-family:var(--body);font-weight:300;color:var(--txt);background:var(--raise);border:1px solid var(--hair);border-radius:9px;padding:8px 11px;font-size:14px;width:100%;outline:none;transition:border-color .15s}
select:focus,input:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 12px rgba(var(--goldRGB),.18)}
select{appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--faint) 50%),linear-gradient(135deg,var(--faint) 50%,transparent 50%);background-position:calc(100% - 16px) 55%,calc(100% - 11px) 55%;background-size:5px 5px;background-repeat:no-repeat;padding-right:28px}
textarea{resize:vertical;line-height:1.6}
input::placeholder,textarea::placeholder{color:var(--faint)}
.nav{flex:1;overflow-y:auto;padding:10px 10px 24px}
.nsec{font-family:var(--mono);font-size:8.5px;letter-spacing:2.2px;color:var(--faint);text-transform:uppercase;padding:16px 12px 6px}
.nitem{display:flex;align-items:center;gap:11px;padding:8px 12px;border-radius:9px;cursor:pointer;color:var(--dim);font-size:14px;transition:.13s;position:relative}
.nitem:hover{color:var(--txt);background:rgba(255,255,255,.025)}
.nitem.on{color:var(--gold2);background:rgba(var(--goldRGB),.09);box-shadow:inset 0 0 16px rgba(var(--goldRGB),.1),0 0 14px rgba(var(--goldRGB),.14)}
.nitem.on::before{content:'';position:absolute;left:0;top:9px;bottom:9px;width:2px;border-radius:2px;background:var(--gold);box-shadow:0 0 8px rgba(var(--goldRGB),.8)}
.nitem .g{width:17px;text-align:center;font-size:13px;opacity:.85}
.nitem .ct{margin-left:auto;font-family:var(--mono);font-size:9.5px;color:var(--faint)}

.main{flex:1;display:flex;flex-direction:column;min-width:0}
.top{padding:18px 30px 14px;display:flex;align-items:baseline;gap:14px}
.top h2{font-family:var(--disp);font-weight:500;font-size:26px;color:var(--txt);letter-spacing:.3px}
.top .tag{font-size:13px;color:var(--faint);font-style:italic}
.top .sp{flex:1}
.content{flex:1;overflow-y:auto;padding:6px 30px 40px}
.wrap{max-width:1060px;margin:0 auto}

/* ── controls ── */
.btn{font-family:var(--body);font-weight:400;font-size:13.5px;padding:8px 15px;border-radius:9px;border:1px solid var(--hair2);
  background:linear-gradient(180deg,var(--raise2),var(--raise));color:var(--dim);cursor:pointer;transition:.16s;
  display:inline-flex;align-items:center;gap:7px;white-space:nowrap;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07),inset 0 -1px 0 rgba(0,0,0,.3),0 2px 6px rgba(0,0,0,.4),0 0 10px rgba(var(--goldRGB),.10)}
.btn:hover{color:var(--gold2);border-color:var(--gold);transform:translateY(-1px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.1),inset 0 -1px 0 rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.45),0 0 20px rgba(var(--goldRGB),.35)}
.btn:active{transform:translateY(1px);box-shadow:inset 0 2px 5px rgba(0,0,0,.45)}
.btn.gold{background:linear-gradient(180deg,color-mix(in srgb,var(--gold) 72%,#fff),var(--gold) 45%,color-mix(in srgb,var(--gold) 74%,#000));color:#171205;border-color:color-mix(in srgb,var(--gold) 80%,#fff);font-weight:500;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.5),inset 0 -2px 4px rgba(0,0,0,.35),0 3px 10px rgba(0,0,0,.5),0 0 22px rgba(var(--goldRGB),.45)}
.btn.gold:hover{filter:brightness(1.07);transform:translateY(-1px);box-shadow:inset 0 1px 0 rgba(255,255,255,.55),inset 0 -2px 4px rgba(0,0,0,.3),0 5px 14px rgba(0,0,0,.55),0 0 34px rgba(var(--goldRGB),.65)}
.btn.gold:active{transform:translateY(1px);filter:brightness(.96);box-shadow:inset 0 2px 6px rgba(80,55,15,.5),0 0 12px rgba(var(--goldRGB),.3)}
.btn.sm{padding:5px 11px;font-size:12.5px;border-radius:8px}
.btn.ghost{border-color:transparent;background:transparent;box-shadow:none}
.btn.danger:hover{border-color:var(--ember);color:#e89a85;background:rgba(207,107,78,.06)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn:focus-visible,.nitem:focus-visible,input:focus-visible{outline:1.5px solid var(--gold);outline-offset:2px}

/* ── surfaces ── */
.card{background:var(--raise);border:1px solid var(--hair);border-radius:var(--r);padding:18px}
.card.hov{cursor:pointer;transition:.18s}
.card.hov:hover{border-color:rgba(var(--goldRGB),.4);box-shadow:0 6px 18px rgba(0,0,0,.4),0 0 22px rgba(var(--goldRGB),.14);transform:translateY(-2px)}
.card.hov:hover{border-color:rgba(var(--goldRGB),.45);transform:translateY(-2px);box-shadow:var(--shadow)}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:repeat(auto-fill,minmax(290px,1fr))}
.g3{grid-template-columns:repeat(auto-fill,minmax(215px,1fr))}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.between{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.field{margin-bottom:14px}
.field label{font-family:var(--mono);font-size:9px;letter-spacing:1.6px;color:var(--faint);text-transform:uppercase;display:block;margin-bottom:6px}
.muted{color:var(--dim)} .hint{font-size:13px;color:var(--faint);font-style:italic}
.h3{font-family:var(--disp);font-weight:500;font-size:19px;color:var(--txt)}
.rule{height:1px;background:var(--hair);margin:24px 0;border:0}
.empty{text-align:center;padding:64px 20px;color:var(--faint)}
.empty .glyph{font-size:30px;opacity:.45;margin-bottom:14px;color:var(--gold)}
.empty .act{margin-top:16px}

.chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:20px;border:1px solid}
.tag{display:inline-block;font-size:11.5px;padding:2px 10px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid var(--hair);color:var(--dim);margin:2px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.pill{display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border-radius:9px;background:rgba(255,255,255,.03);border:1px solid var(--hair);cursor:pointer;font-size:13px;transition:.12s;margin:3px 5px 3px 0;color:var(--dim)}
.pill:hover{border-color:var(--gold);color:var(--txt)}

/* ── modal ── */
.scrim{position:fixed;inset:0;background:rgba(5,6,10,.72);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;animation:fade .16s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:var(--deep);border:1px solid var(--hair2);border-radius:16px;width:100%;max-width:620px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow);animation:pop .2s}
@keyframes pop{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
.modal.wide{max-width:840px}
.mhead{padding:18px 22px;border-bottom:1px solid var(--hair);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:var(--deep);z-index:2}
.mhead h3{font-family:var(--disp);font-weight:500;font-size:22px;color:var(--txt);flex:1}
.mbody{padding:22px}
.mfoot{padding:14px 22px;border-top:1px solid var(--hair);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:var(--deep)}
.x{cursor:pointer;color:var(--faint);font-size:21px;line-height:1;padding:4px 7px;border-radius:7px}
.x:hover{color:var(--txt);background:rgba(255,255,255,.05)}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--raise2);border:1px solid rgba(var(--goldRGB),.5);color:var(--gold2);padding:11px 22px;border-radius:11px;font-size:13.5px;z-index:300;box-shadow:var(--shadow);animation:rise .22s}
@keyframes rise{from{transform:translate(-50%,14px);opacity:0}to{transform:translate(-50%,0);opacity:1}}

/* ── widgets ── */
.stat{padding:16px 18px;border:1px solid var(--hair);border-radius:var(--r);background:linear-gradient(180deg,var(--raise),transparent)}
.stat .n{font-family:var(--disp);font-weight:500;font-size:30px;color:var(--gold2);line-height:1}
.stat .l{font-family:var(--mono);font-size:8.5px;letter-spacing:1.6px;color:var(--faint);text-transform:uppercase;margin-top:7px}
.beat{background:rgba(255,255,255,.025);border:1px solid var(--hair);border-left:2px solid var(--gold);border-radius:9px;padding:10px 13px;margin-bottom:9px}
.cmsg{display:flex;margin-bottom:14px}
.cmsg.u{justify-content:flex-end}
.bub{max-width:78%;padding:12px 16px;border-radius:14px;font-size:14.5px;line-height:1.6;white-space:pre-wrap}
.cmsg.u .bub{background:rgba(var(--goldRGB),.10);border:1px solid rgba(var(--goldRGB),.22)}
.cmsg.a .bub{background:var(--raise);border:1px solid var(--hair)}
.dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gold);margin:0 2px;animation:bl 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes bl{0%,60%,100%{opacity:.2}30%{opacity:1}}

/* ── galaxy ── */
.gal-wrap{position:relative;height:calc(100vh - 118px);min-height:440px;border:1px solid var(--hair);border-radius:16px;overflow:hidden;background:radial-gradient(1200px 700px at 60% 35%, #10131f 0%, #0a0b10 60%)}
.gal-wrap canvas{display:block;width:100%;height:100%;cursor:grab}
.hud{position:absolute;display:flex;gap:7px;align-items:center;z-index:5}
.hud.tl{top:14px;left:14px}
.hud.tr{top:14px;right:14px}
.hud.bl{bottom:14px;left:14px;flex-wrap:wrap;max-width:70%}
.hud .glass,.hbtn,.hsearch{background:rgba(12,14,22,.72);backdrop-filter:blur(8px);border:1px solid var(--hair2);border-radius:10px}
.hbtn{padding:7px 12px;font-size:12.5px;color:var(--dim);cursor:pointer;transition:.13s;font-family:var(--body)}
.hbtn:hover{color:var(--txt);border-color:var(--gold)}
.hbtn.on{color:var(--gold2);border-color:var(--gold);background:rgba(var(--goldRGB),.12)}
.hsearch{display:flex;align-items:center;padding:0 4px 0 12px}
.hsearch input{background:transparent;border:none;width:150px;padding:7px 4px;font-size:13px}
.lchip{font-family:var(--mono);font-size:9px;letter-spacing:.8px;text-transform:uppercase;padding:4px 11px;border-radius:16px;cursor:pointer;border:1px solid;background:rgba(12,14,22,.72);backdrop-filter:blur(8px);transition:.13s}
.inspector{position:absolute;top:0;right:0;bottom:0;width:308px;background:rgba(11,13,20,.92);backdrop-filter:blur(14px);border-left:1px solid var(--hair2);z-index:8;overflow-y:auto;animation:slide .2s}
@keyframes slide{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}
.gal-note{position:absolute;left:50%;top:14px;transform:translateX(-50%);z-index:6;font-family:var(--mono);font-size:10.5px;letter-spacing:.6px;color:var(--gold2);background:rgba(12,14,22,.8);border:1px solid rgba(var(--goldRGB),.45);border-radius:9px;padding:7px 14px;backdrop-filter:blur(8px)}
.epop{position:absolute;z-index:9;display:flex;gap:6px;align-items:center;background:rgba(12,14,22,.9);backdrop-filter:blur(10px);border:1px solid rgba(var(--goldRGB),.5);border-radius:11px;padding:7px 9px;box-shadow:var(--shadow)}
.qadd{position:absolute;z-index:9;background:rgba(12,14,22,.92);backdrop-filter:blur(10px);border:1px solid var(--hair2);border-radius:12px;padding:6px;box-shadow:var(--shadow);min-width:160px}
.qadd .qi{display:flex;align-items:center;gap:10px;padding:7px 11px;border-radius:8px;cursor:pointer;color:var(--dim);font-size:13.5px}
.qadd .qi:hover{background:rgba(255,255,255,.05);color:var(--txt)}

/* ── mobile ── */
.mobnav{display:none}
@media(max-width:840px){
  .rail{display:none}
  .top{padding:14px 16px 10px}
  .content{padding:4px 14px 96px}
  .gal-wrap{height:calc(100vh - 200px)}
  .inspector{width:min(86vw,308px)}
  .mobnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:rgba(11,13,20,.92);backdrop-filter:blur(12px);border-top:1px solid var(--hair);z-index:60;overflow-x:auto;padding:6px 6px calc(6px + env(safe-area-inset-bottom))}
  .mobnav .mi{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 12px;color:var(--dim);font-size:9px;cursor:pointer;border-radius:9px}
  .mobnav .mi.on{color:var(--gold2)}
  .mobnav .mi .g{font-size:16px}
  .g2,.g3{grid-template-columns:1fr}
}

/* ── v8: board ── */
.bdwrap{position:relative;overflow:hidden;height:calc(100dvh - 158px);border:1px solid var(--hair);border-radius:var(--r);background:var(--deep);cursor:grab;
  background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px);background-size:26px 26px}
.bdwrap.panning{cursor:grabbing}
.bditem{position:absolute;border-radius:10px;user-select:none}
.bditem.sel{outline:1.5px solid var(--gold);outline-offset:2px;box-shadow:0 0 18px rgba(var(--goldRGB),.3)}
.bdnote{background:linear-gradient(180deg,var(--raise2),var(--raise));border:1px solid var(--hair2);padding:12px 14px;box-shadow:0 6px 16px rgba(0,0,0,.45);cursor:move}
.bdnote .t{font-family:var(--disp);font-weight:500;font-size:16px;color:var(--gold2);margin-bottom:5px}
.bdnote .b{font-size:12.5px;line-height:1.55;color:var(--dim);white-space:pre-wrap;word-break:break-word}
.bdlabel{background:transparent;cursor:move;font-family:var(--disp);font-weight:500;color:var(--gold2);text-shadow:0 2px 12px rgba(0,0,0,.6);letter-spacing:.5px;line-height:1.1}
.bdimg{overflow:hidden;border:1px solid var(--hair2);box-shadow:0 8px 20px rgba(0,0,0,.5);cursor:move;background:#0d0f17}
.bdimg img{width:100%;display:block;pointer-events:none}
.bdent{background:var(--raise);border:1px solid var(--hair2);padding:10px 12px;box-shadow:0 6px 16px rgba(0,0,0,.45);cursor:move;display:flex;gap:10px;align-items:center}
.bdent img{width:38px;height:38px;border-radius:50%;object-fit:cover}
.bdent .ini{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-size:17px;background:#0d0f17}
.bdhandle{position:absolute;right:-5px;bottom:-5px;width:12px;height:12px;border-radius:3px;background:var(--gold);cursor:nwse-resize;opacity:0;transition:.12s}
.bditem.sel .bdhandle,.bditem:hover .bdhandle{opacity:.9}
.bdbar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:10px 0}
.bdpop{position:absolute;left:14px;bottom:14px;background:var(--raise);border:1px solid var(--hair2);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow);z-index:5;width:250px}
textarea.bdedit{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--hair2);border-radius:8px;color:var(--txt);font-size:12.5px;line-height:1.55;padding:8px;resize:none}
input.bdedit{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--hair2);border-radius:8px;color:var(--gold2);font-family:var(--disp);padding:6px 8px}
.bdnote.v-postit{border:none;border-radius:2px;box-shadow:2px 7px 15px rgba(0,0,0,.5)}
.bdnote.v-postit::after{content:'';position:absolute;bottom:0;right:0;border-style:solid;border-width:0 0 17px 17px;border-color:transparent transparent rgba(0,0,0,.2) transparent}
.bdnote.v-postit .t{font-family:'Caveat',cursive;color:#3b3012;font-size:20px;margin-bottom:1px}
.bdnote.v-postit .b{font-family:'Caveat',cursive;color:#443916;font-size:18px;line-height:1.3}
.bdnote.v-index{background:#efe9d8;border:1px solid #cfc4a6;border-radius:4px;box-shadow:2px 6px 13px rgba(0,0,0,.5);padding:30px 14px 12px;
  background-image:linear-gradient(180deg,transparent 22px,#c46a5a 22px,#c46a5a 23.5px,transparent 23.5px),repeating-linear-gradient(180deg,transparent 0 21px,rgba(122,155,178,.55) 21px 22px);background-position:0 0,0 30px}
.bdnote.v-index .t{color:#59482a;font-size:15px}
.bdnote.v-index .b{color:#48412f;font-size:12px;line-height:22px}
.bdimg.v-stamp{background:#ece6d4;padding:9px;border:none;border-radius:0;
  -webkit-mask:linear-gradient(#000 0 0) content-box,radial-gradient(circle 3.5px,#000 3.4px,transparent 3.7px) -5.5px -5.5px/11px 11px;
  mask:linear-gradient(#000 0 0) content-box,radial-gradient(circle 3.5px,#000 3.4px,transparent 3.7px) -5.5px -5.5px/11px 11px}
.bdimg.v-stamp img{outline:1px solid #b8ae8f}
.bdimg.v-polaroid{background:#f0ece1;padding:10px 10px 36px;border:none;border-radius:2px;box-shadow:3px 9px 18px rgba(0,0,0,.55)}
.bdimg .cap{position:absolute;left:0;right:0;bottom:5px;text-align:center;font-family:'Caveat',cursive;color:#4a4030;font-size:17px;pointer-events:none}
.bdimg.v-taped{overflow:visible;border:5px solid #efeadd;border-radius:0;box-shadow:2px 7px 16px rgba(0,0,0,.55)}
.bdimg.v-taped::before,.bdimg.v-taped::after{content:'';position:absolute;width:56px;height:17px;background:rgba(216,204,166,.5);box-shadow:0 1px 3px rgba(0,0,0,.35);top:-10px;z-index:2}
.bdimg.v-taped::before{left:-16px;transform:rotate(-38deg)}
.bdimg.v-taped::after{right:-16px;transform:rotate(38deg)}
.bditem.f-hand .t,.bditem.f-hand .b{font-family:'Caveat',cursive}
.bditem.f-hand .t{font-size:20px}
.bditem.f-hand .b{font-size:17.5px;line-height:1.32}
.bdlabel.f-hand{font-family:'Caveat',cursive}
.bditem.f-type .t,.bditem.f-type .b{font-family:'Special Elite',monospace}
.bditem.f-type .t{font-size:15px}
.bditem.f-type .b{font-size:11.5px;line-height:1.75}
.bdlabel.f-type{font-family:'Special Elite',monospace;letter-spacing:1px}
.bditem.f-mono .t,.bditem.f-mono .b{font-family:var(--mono)}
.bditem.f-mono .t{font-size:13.5px;letter-spacing:1px}
.bditem.f-mono .b{font-size:11.5px;line-height:1.7}
.bdlabel.f-mono{font-family:var(--mono);letter-spacing:2px}
/* ── v4: hero, manuscript, palette, nudge ── */
.rail{position:relative;overflow:hidden}
.rail-art{position:absolute;left:0;right:0;bottom:0;height:300px;pointer-events:none;opacity:.5;
  -webkit-mask-image:linear-gradient(180deg,transparent,rgba(0,0,0,.85) 62%);mask-image:linear-gradient(180deg,transparent,rgba(0,0,0,.85) 62%)}
.rail-art img{width:100%;height:100%;object-fit:cover;object-position:78% 18%;filter:saturate(.85) brightness(.8)}
.rail .brand,.rail .proj,.rail .nav{position:relative;z-index:1}
.hero{position:relative;height:190px;margin:18px 0 0;border-radius:var(--r);overflow:hidden;border:1px solid var(--hair2);box-shadow:0 0 24px rgba(var(--goldRGB),.09),var(--shadow)}
.hero img{width:100%;height:100%;object-fit:cover;display:block}
.hero .fade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,11,16,.05),rgba(10,11,16,.82))}
.bknudge{display:flex;align-items:center;justify-content:space-between;gap:14px;margin:10px 26px 0;padding:9px 14px;border:1px solid var(--hair2);border-radius:10px;background:rgba(var(--goldRGB),.05);color:var(--dim);font-size:13px}
.msgrid{display:flex;gap:18px;align-items:flex-start;padding-top:14px}
.mslist{width:236px;min-width:236px;max-height:calc(100dvh - 150px);overflow-y:auto;padding-right:4px;position:sticky;top:0}
.msitem{padding:8px 10px;border:1px solid transparent;border-radius:9px;cursor:pointer;margin-bottom:3px}
.msitem:hover{background:rgba(255,255,255,.03)}
.msitem.on{background:rgba(var(--goldRGB),.09);border-color:var(--hair2);box-shadow:0 0 12px rgba(var(--goldRGB),.12)}
.msitem .ttl{font-family:var(--disp);font-size:15px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.msitem .wc{font-family:var(--mono);font-size:9.5px;color:var(--faint)}
.msitem .bar{height:2px;background:rgba(255,255,255,.05);border-radius:2px;margin-top:6px;overflow:hidden}
.msitem .bar div{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px}
.msmain{flex:1;min-width:0}
.mseditor{width:100%;min-height:calc(100dvh - 310px);background:transparent;border:none;border-radius:0;padding:18px 2px;font-family:var(--body);font-weight:300;font-size:17px;line-height:1.85;color:var(--txt);resize:vertical}
.mseditor:focus{border:none;outline:none}
.mseditor.big{min-height:calc(100dvh - 130px);font-size:18px;resize:none}
.msref{width:276px;min-width:276px;border:1px solid var(--hair);border-radius:var(--r);padding:16px;background:var(--deep);position:sticky;top:0;max-height:calc(100dvh - 150px);overflow-y:auto}
.msfocus{position:fixed;inset:0;background:var(--void);z-index:60;display:flex;justify-content:center;overflow-y:auto}
.msfocus .inner{width:min(720px,92vw);padding:6vh 0 10vh}
.chip.sprint{color:var(--gold2);border-color:var(--gold);font-family:var(--mono);font-size:11px}
.palette{width:min(620px,94vw);background:var(--raise);border:1px solid var(--hair2);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
.palette>input{border:none;border-bottom:1px solid var(--hair);border-radius:0;background:transparent;padding:15px 18px;font-size:16px}
.palette>input:focus{border-color:var(--hair)}
.plist{max-height:340px;overflow-y:auto;padding:6px}
.pitem{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:9px;cursor:pointer}
.pitem.on{background:rgba(var(--goldRGB),.09)}
.pitem .g{width:18px;text-align:center;color:var(--gold);font-size:13px}
.pitem .lbl{flex:1;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pitem .sub{font-family:var(--mono);font-size:9.5px;letter-spacing:1px;color:var(--faint);text-transform:uppercase}
.pfoot{display:flex;justify-content:space-between;padding:8px 14px;border-top:1px solid var(--hair);font-family:var(--mono);font-size:9.5px;color:var(--faint)}
.heat{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,10px);grid-auto-columns:10px;gap:3px;overflow-x:auto;padding-bottom:4px}
.hcell{width:10px;height:10px;border-radius:2.5px;background:rgba(255,255,255,.035)}
.grid.g4{display:grid;grid-template-columns:repeat(4,1fr)}
@media(max-width:700px){.grid.g4{grid-template-columns:repeat(2,1fr)}}
.msadd{padding:6px 10px;border:1px dashed var(--hair2);border-radius:9px;color:var(--faint);font-size:12px;cursor:pointer;text-align:center;margin:4px 0;transition:.15s}
.msadd:hover{color:var(--gold2);border-color:var(--gold);box-shadow:0 0 10px rgba(var(--goldRGB),.15)}
.chthumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px}
.chthumb{aspect-ratio:1;border-radius:8px;overflow:hidden;border:1px solid var(--hair);background:rgba(255,255,255,.02)}
.chthumb img{width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in;transition:.15s}
.chthumb img:hover{transform:scale(1.05)}
.chent{padding:7px 10px;border:1px solid var(--hair);border-radius:9px;margin-bottom:6px;background:rgba(255,255,255,.015)}
.chent .nm{font-family:var(--disp);font-weight:500;font-size:15px;cursor:pointer}
.chent .nm:hover{color:var(--gold2)}
.chent .ct{font-family:var(--mono);font-size:9.5px;color:var(--faint)}
@media(max-width:860px){.msgrid{flex-direction:column}.mslist{width:100%;min-width:0;position:static;max-height:200px}.msref{width:100%;min-width:0;position:static}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react-classic">
const {useState,useEffect,useMemo,useRef,useCallback} = React;

/* ════════ STORE (same key & shapes as v2 — your data carries over) ════════ */
const KEY='scriptorium.v2';
const uid=()=>Math.random().toString(36).slice(2,10);
const now=()=>new Date().toISOString();

const ENTITY_TYPES={
  character:{label:'Character',plural:'Characters',g:'❖',color:'#e09a62',
    fields:['role','species','status','appearance','personality','motivation','arc','abilities']},
  location:{label:'Location',plural:'Locations',g:'◆',color:'#7cc6a0',
    fields:['region','type','description','atmosphere','significance','inhabitants']},
  faction:{label:'Faction',plural:'Factions',g:'⬡',color:'#b88bd6',
    fields:['type','goals','ideology','leadership','resources','status']},
  item:{label:'Item',plural:'Items',g:'✦',color:'#e3c884',
    fields:['type','rarity','description','properties','origin','owner']},
  lore:{label:'Lore',plural:'Lore & World',g:'✧',color:'#7fa6e0',
    fields:['category','summary','rules','history']},
  event:{label:'Event',plural:'Events',g:'◉',color:'#e0705c',
    fields:['when','where','summary','consequence']},
};
const FIELD_LABELS={role:'Role',species:'Species / Race',status:'Status',appearance:'Appearance',personality:'Personality',motivation:'Motivation / Goal',arc:'Character Arc',abilities:'Abilities / Skills',region:'Region',type:'Type',description:'Description',atmosphere:'Atmosphere / Mood',significance:'Story Significance',inhabitants:'Inhabitants',goals:'Goals',ideology:'Ideology',leadership:'Leadership',resources:'Resources',rarity:'Rarity',properties:'Properties',origin:'Origin',owner:'Owner',category:'Category',summary:'Summary',rules:'Rules / Mechanics',history:'History',when:'When',where:'Where',consequence:'Consequence / Fallout'};

function defProjectData(){
  return {entities:[],plot:{acts:[]},braindump:[],log:[],foreshadow:[],screens:[],
    board:{positions:{}},relations:{},gallery:[],manuscript:{},canvas:[]};
}
function defStore(){
  const id=uid();
  return {projects:[{id,name:'Untitled Work',desc:''}],cur:id,
    data:{[id]:defProjectData()},
    settings:{apiKey:'',model:'claude-sonnet-5',lastBackup:'',backupSnooze:''}};
}
function load(){
  try{const r=localStorage.getItem(KEY);if(r){const d=JSON.parse(r);
    Object.keys(d.data||{}).forEach(k=>{d.data[k]={...defProjectData(),...d.data[k]};});
    d.settings={...defStore().settings,...(d.settings||{})};
    return d;}}catch(e){console.warn(e);}
  return defStore();
}
function save(d){try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){console.warn(e);}}

/* ════════ IMAGE STORE (IndexedDB) ════════ */
function idb(){return new Promise((res,rej)=>{const r=indexedDB.open('scriptorium-media',2);
  r.onupgradeneeded=()=>{const db=r.result;
    if(!db.objectStoreNames.contains('images'))db.createObjectStore('images',{keyPath:'id'});
    if(!db.objectStoreNames.contains('snapshots'))db.createObjectStore('snapshots',{keyPath:'id'});};
  r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function idbPut(rec){const db=await idb();return new Promise((res,rej)=>{const t=db.transaction('images','readwrite');t.objectStore('images').put(rec);t.oncomplete=()=>res(rec);t.onerror=()=>rej(t.error);});}
async function idbGet(id){const db=await idb();return new Promise((res,rej)=>{const t=db.transaction('images','readonly');const q=t.objectStore('images').get(id);q.onsuccess=()=>res(q.result||null);q.onerror=()=>rej(q.error);});}
async function idbDelete(id){if(!id)return;const db=await idb();return new Promise((res,rej)=>{const t=db.transaction('images','readwrite');t.objectStore('images').delete(id);t.oncomplete=()=>res();t.onerror=()=>rej(t.error);});}
async function idbAll(){const db=await idb();return new Promise((res,rej)=>{const t=db.transaction('images','readonly');const q=t.objectStore('images').getAll();q.onsuccess=()=>res(q.result||[]);q.onerror=()=>rej(q.error);});}

const imgCache=new Map();
function useImageURL(id){
  const [url,setUrl]=useState(()=>id&&imgCache.has(id)?imgCache.get(id):null);
  useEffect(()=>{let on=true;
    if(!id){setUrl(null);return;}
    if(imgCache.has(id)){setUrl(imgCache.get(id));return;}
    idbGet(id).then(rec=>{if(on&&rec){imgCache.set(id,rec.dataUrl);setUrl(rec.dataUrl);}}).catch(()=>{});
    return ()=>{on=false;};
  },[id]);
  return url;
}
function loadImageEl(src){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=src;});}
function readFileDataURL(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);});}
async function storeImageFile(file){
  const src=await readFileDataURL(file);
  const img=await loadImageEl(src);
  const max=1000;let w=img.width,h=img.height;
  if(Math.max(w,h)>max){const s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
  const c=document.createElement('canvas');c.width=w;c.height=h;
  c.getContext('2d').drawImage(img,0,0,w,h);
  const png=/png/i.test(file.type||'');
  const dataUrl=png?c.toDataURL('image/png'):c.toDataURL('image/jpeg',0.85);
  const rec={id:uid(),dataUrl,name:file.name||'image',addedAt:now()};
  await idbPut(rec);imgCache.set(rec.id,dataUrl);return rec;
}
function imageFromPaste(e){const items=(e.clipboardData||{}).items||[];for(const it of items){if(it.type&&it.type.startsWith('image/'))return it.getAsFile();}return null;}

function ImagePicker({onAdd,flash}){
  const ref=useRef();const [busy,setBusy]=useState(false);
  const handle=async(file)=>{if(!file)return;setBusy(true);try{const rec=await storeImageFile(file);onAdd(rec);}catch(err){flash&&flash('Could not add that image');console.warn(err);}setBusy(false);};
  return (
    <div onPaste={e=>{const f=imageFromPaste(e);if(f){e.preventDefault();handle(f);}}}
      onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();handle(e.dataTransfer.files[0]);}}
      tabIndex={0} onClick={()=>ref.current.click()}
      style={{border:'1px dashed var(--hair2)',borderRadius:11,padding:'18px 14px',textAlign:'center',cursor:'pointer',outline:'none'}}>
      <input ref={ref} type="file" accept="image/*" style={{display:'none'}} onChange={e=>handle(e.target.files[0])}/>
      <div style={{fontSize:18,opacity:.5,color:'var(--gold)'}}>✦</div>
      <div className="muted" style={{fontSize:12.5,marginTop:5}}>{busy?'Adding…':'Upload, drop a file, or paste (Ctrl+V)'}</div>
    </div>
  );
}
function EntityImageField({e,setE,flash}){
  const url=useImageURL(e.imageId);
  const remove=()=>{idbDelete(e.imageId);imgCache.delete(e.imageId);setE(s=>({...s,imageId:null}));};
  return e.imageId&&url
    ? <div style={{position:'relative',width:140}}>
        <img src={url} alt="" style={{width:140,height:140,objectFit:'cover',borderRadius:11,border:'1px solid var(--hair2)'}}/>
        <span className="x" style={{position:'absolute',top:4,right:4,background:'rgba(0,0,0,.55)',borderRadius:7}} onClick={remove}>×</span>
      </div>
    : <ImagePicker flash={flash} onAdd={rec=>setE(s=>({...s,imageId:rec.id}))}/>;
}

/* ════════ TABS ════════ */
const TABS=[
  {id:'dash',g:'⌂',lbl:'Dashboard',sec:'Overview'},
  {id:'codex',g:'❖',lbl:'Codex',sec:'World'},
  {id:'board',g:'⌗',lbl:'Board',sec:'World'},
  {id:'galaxy',g:'✦',lbl:'Galaxy',sec:'World'},
  {id:'write',g:'❧',lbl:'Manuscript',sec:'Story'},
  {id:'plot',g:'▤',lbl:'Plot',sec:'Story'},
  {id:'threads',g:'⌇',lbl:'Threads',sec:'Story'},
  {id:'screens',g:'▣',lbl:'System Screens',sec:'Story'},
  {id:'capture',g:'✎',lbl:'Capture',sec:'Studio'},
  {id:'import',g:'⇲',lbl:'Import',sec:'Studio'},
  {id:'gallery',g:'▦',lbl:'Gallery',sec:'Studio'},
  {id:'log',g:'∿',lbl:'Writing Log',sec:'Studio'},
  {id:'names',g:'✺',lbl:'Name Forge',sec:'Studio'},
  {id:'ai',g:'✧',lbl:'Companion',sec:'Companion'},
];
const TAGLINES={dash:'Your work at a glance',codex:'Every person, place & power',galaxy:'Your world as a living constellation',write:'Where the words go down',board:'Pin it where it belongs',plot:'The shape of the journey',threads:'Seeds planted & paid',screens:'LitRPG interface design',capture:'Catch every spark',import:'Turn a manuscript into a world bible',gallery:'A moodboard for your world',log:'Words on the page',names:'Forge a fitting name',ai:'A mind to think alongside'};

/* ════════ APP ════════ */
function App(){
  const [store,setStore]=useState(null);
  const [tab,setTab]=useState('dash');
  const [toast,setToast]=useState(null);
  const [projModal,setProjModal]=useState(false);
  const [setModal,setSetModal]=useState(false);
  const [cmd,setCmd]=useState(false);
  const [jump,setJumpState]=useState(null);
  const setJump=useCallback(j=>setJumpState({...j,ts:Date.now()}),[]);
  const clearJump=useCallback(()=>setJumpState(null),[]);

  useEffect(()=>{
    const h=e=>{
      if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();setCmd(o=>!o);}
    };
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[]);

  useEffect(()=>{setStore(load());},[]);
  useEffect(()=>{
    if(!store)return;
    const rt=document.documentElement.style;
    const p=store.projects.find(x=>x.id===store.cur);
    const th=p&&p.theme&&p.themeOn!==false?p.theme:null;
    const VARS=['--gold','--gold2','--goldRGB','--void','--deep','--raise','--raise2','--hair','--hair2','--dim','--faint'];
    if(th){
      const h=th.h!=null?th.h:hueFromRGB(th.rgb);
      rt.setProperty('--gold',th.a);rt.setProperty('--gold2',th.b);rt.setProperty('--goldRGB',th.rgb);
      if(h!=null){
        rt.setProperty('--void',hsl2hex(h,20,8));
        rt.setProperty('--deep',hsl2hex(h,18,10));
        rt.setProperty('--raise',hsl2hex(h,16,13));
        rt.setProperty('--raise2',hsl2hex(h,15,16));
        rt.setProperty('--hair',`rgba(${th.rgb},.14)`);
        rt.setProperty('--hair2',`rgba(${th.rgb},.26)`);
        rt.setProperty('--dim',hsl2hex(h,14,64));
        rt.setProperty('--faint',hsl2hex(h,10,44));
      }
    }
    else VARS.forEach(v=>rt.removeProperty(v));
  },[store]);
  const upd=useCallback(d=>{setStore(d);save(d);},[]);
  const flash=useCallback(m=>{setToast(m);setTimeout(()=>setToast(null),2100);},[]);
  const setPd=useCallback(patch=>{
    setStore(s=>{const nd={...s,data:{...s.data,[s.cur]:{...s.data[s.cur],...patch}}};save(nd);return nd;});
  },[]);

  if(!store) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',fontFamily:'var(--disp)',color:'var(--dim)',fontSize:20}}>Opening the Scriptorium…</div>;

  const pd=store.data[store.cur];
  const proj=store.projects.find(p=>p.id===store.cur);
  const counts={codex:pd.entities.length,capture:pd.braindump.length,threads:pd.foreshadow.length,screens:pd.screens.length,gallery:(pd.gallery||[]).length};
  const ctx={store,upd,pd,setPd,flash,proj,setTab,jump,setJump,clearJump};
  const needsBackup=(()=>{
    const s=store.settings||{};
    const has=Object.values(store.data).some(d=>(d.entities||[]).length>0||(d.plot?.acts||[]).length>0||Object.keys(d.manuscript||{}).length>0);
    if(!has)return false;
    const DAY=86400000;
    const last=s.lastBackup?Date.parse(s.lastBackup):0;
    const snooze=s.backupSnooze?Date.parse(s.backupSnooze):0;
    if(Date.now()-snooze<7*DAY)return false;
    return Date.now()-last>30*DAY;
  })();
  const snoozeBackup=()=>upd({...store,settings:{...store.settings,backupSnooze:new Date().toISOString()}});
  const cur=TABS.find(t=>t.id===tab);
  let groups={};TABS.forEach(t=>{(groups[t.sec]=groups[t.sec]||[]).push(t);});

  return (
    <div className="app">
      <aside className="rail">
        <div className="brand">
          <h1><span className="star">✦</span>Scriptorium</h1>
          <div className="sub">Writing Studio</div>
        </div>
        <div className="proj">
          <label>Current Work</label>
          <div className="proj-row">
            <select value={store.cur} onChange={e=>upd({...store,cur:e.target.value})}>
              {store.projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
            <button className="btn sm" title="Manage works" onClick={()=>setProjModal(true)}>⚙</button>
          </div>
        </div>
        <RailArt proj={proj}/>
        <nav className="nav">
          {Object.entries(groups).map(([sec,items])=>(
            <div key={sec}>
              <div className="nsec">{sec}</div>
              {items.map(t=>(
                <div key={t.id} tabIndex={0} className={'nitem'+(tab===t.id?' on':'')} onClick={()=>setTab(t.id)} onKeyDown={e=>e.key==='Enter'&&setTab(t.id)}>
                  <span className="g">{t.g}</span><span>{t.lbl}</span>
                  {counts[t.id]>0 && <span className="ct">{counts[t.id]}</span>}
                </div>
              ))}
            </div>
          ))}
          <div className="nsec">Settings</div>
          <div className="nitem" tabIndex={0} onClick={()=>setSetModal(true)}>
            <span className="g">⚿</span><span>API & Backup</span>
          </div>
        </nav>
      </aside>

      <main className="main">
        <div className="top">
          <h2>{cur.lbl}</h2>
          <span className="tag">{TAGLINES[tab]}</span>
        </div>
        {needsBackup &&
          <div className="bknudge">
            <span>It has been a while since your last backup. Everything lives on this machine alone.</span>
            <span className="row" style={{gap:8}}>
              <button className="btn sm gold" onClick={()=>setSetModal(true)}>Back up now</button>
              <button className="btn sm" onClick={snoozeBackup}>Later</button>
            </span>
          </div>}
        <div className="content">
          <div className="wrap" style={tab==='galaxy'||tab==='board'?{maxWidth:'100%'}:tab==='write'?{maxWidth:1200}:null}>
            <TabRouter tab={tab} ctx={ctx}/>
          </div>
        </div>
      </main>

      <nav className="mobnav">
        {TABS.map(t=>(
          <div key={t.id} className={'mi'+(tab===t.id?' on':'')} onClick={()=>setTab(t.id)}>
            <span className="g">{t.g}</span><span>{t.lbl.split(' ')[0]}</span>
          </div>
        ))}
        <div className="mi" onClick={()=>setSetModal(true)}><span className="g">⚿</span><span>Setup</span></div>
      </nav>

      {cmd && <CmdPalette ctx={ctx} close={()=>setCmd(false)}/>}
      {projModal && <ProjectModal store={store} upd={upd} flash={flash} close={()=>setProjModal(false)}/>}
      {setModal && <SettingsModal store={store} upd={upd} flash={flash} close={()=>setSetModal(false)}/>}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

function TabRouter({tab,ctx}){
  switch(tab){
    case 'dash':return <Dashboard ctx={ctx}/>;
    case 'codex':return <Codex ctx={ctx}/>;
    case 'galaxy':return <Galaxy ctx={ctx}/>;
    case 'write':return <Manuscript ctx={ctx}/>;
    case 'board':return <Board ctx={ctx}/>;
    case 'plot':return <Plot ctx={ctx}/>;
    case 'threads':return <Threads ctx={ctx}/>;
    case 'screens':return <Screens ctx={ctx}/>;
    case 'capture':return <Capture ctx={ctx}/>;
    case 'import':return <ImportTab ctx={ctx}/>;
    case 'gallery':return <Gallery ctx={ctx}/>;
    case 'log':return <WritingLog ctx={ctx}/>;
    case 'names':return <NameForge ctx={ctx}/>;
    case 'ai':return <AICompanion ctx={ctx}/>;
    default:return null;
  }
}

/* ════════ DASHBOARD ════════ */
function Dashboard({ctx}){
  const {pd,proj,setTab,setJump,store,upd}=ctx;
  const lt=pd.lastTouched;
  let ltCh=null,ltAct=null;
  if(lt){for(const a of pd.plot.acts){const f=a.chapters.find(x=>x.id===lt.chId);if(f){ltCh=f;ltAct=a;break;}}}
  const coverUrl=useImageURL(proj.coverId);
  const totalWords=pd.log.reduce((a,l)=>a+(+l.words||0),0);
  const msWords=Object.values(pd.manuscript||{}).reduce((a,m)=>a+countWords(m&&m.text),0);
  const chapters=pd.plot.acts.reduce((a,ac)=>a+ac.chapters.length,0);
  const open=pd.foreshadow.filter(f=>f.planted&&!f.paid);
  const fresh=pd.entities.length===0&&chapters===0;
  const stats=[
    {n:pd.entities.length,l:'Codex entries'},
    {n:chapters,l:'Chapters'},
    {n:msWords.toLocaleString(),l:'Manuscript words'},
    {n:totalWords.toLocaleString(),l:'Words logged'},
    {n:open.length,l:'Open threads'},
  ];
  return (
    <div>
      <div className="hero">
        <img src={coverUrl||'fairy.jpg'} alt="" style={coverUrl?null:{objectPosition:'50% 22%'}}/>
        <div className="fade"/>
      </div>
      <div style={{padding:'14px 0 8px'}}>
        <div className="hint" style={{fontFamily:'var(--mono)',fontSize:9,letterSpacing:2.4,textTransform:'uppercase',fontStyle:'normal'}}>Now writing</div>
        <h2 style={{fontFamily:'var(--disp)',fontWeight:500,fontSize:38,color:'var(--gold2)',lineHeight:1.1,margin:'8px 0 6px'}}>{proj.name}</h2>
        {proj.desc && <p className="muted" style={{fontStyle:'italic',maxWidth:620}}>{proj.desc}</p>}
      </div>
      <hr className="rule"/>
      {ltCh &&
        <div className="card hov" style={{padding:'16px 20px',marginBottom:18,display:'flex',justifyContent:'space-between',alignItems:'center',gap:14,flexWrap:'wrap'}}
          onClick={()=>{setJump({type:'chapter',id:ltCh.id});setTab('write');}}>
          <div>
            <div className="hint" style={{fontFamily:'var(--mono)',fontStyle:'normal',fontSize:9,letterSpacing:2.2,textTransform:'uppercase'}}>Continue</div>
            <div style={{fontFamily:'var(--disp)',fontWeight:500,fontSize:22,color:'var(--gold2)',margin:'4px 0 2px'}}>{ltCh.title}</div>
            <div className="muted" style={{fontSize:13}}>{ltAct.title} · {countWords(((pd.manuscript||{})[ltCh.id]||{}).text).toLocaleString()} words · touched {timeAgo(lt.at)}</div>
          </div>
          <span className="btn gold">Write ›</span>
        </div>}
      {fresh
        ? <div className="card" style={{padding:26}}>
            <div className="h3" style={{marginBottom:8}}>Begin the atlas</div>
            <p className="muted" style={{maxWidth:560,marginBottom:18}}>Three ways in: write entries by hand in the Codex, let a manuscript populate everything through Import, or sketch the journey first in Plot. The Galaxy lights up as your world connects.</p>
            <div className="row">
              <button className="btn gold" onClick={()=>setTab('codex')}>Open the Codex</button>
              <button className="btn" onClick={()=>setTab('import')}>Import a manuscript</button>
              <button className="btn" onClick={()=>setTab('plot')}>Outline the plot</button>
            </div>
          </div>
        : <>
            <div className="grid g3" style={{marginBottom:22}}>
              {stats.map((s,i)=><div key={i} className="stat"><div className="n">{s.n}</div><div className="l">{s.l}</div></div>)}
            </div>
            <div className="grid g3">
              {[['write','❧','Manuscript','Sit down and write'],['galaxy','✦','Galaxy','See the constellation'],['codex','❖','Codex','People, places & powers'],['plot','▤','Plot','Acts, chapters, beats'],['threads','⌇','Threads','Seeds planted & paid'],['ai','✧','Companion','Think it through']].map(([id,g,t,d])=>(
                <div key={id} className="card hov" onClick={()=>setTab(id)}>
                  <div style={{fontSize:19,color:'var(--gold)',marginBottom:10}}>{g}</div>
                  <div style={{fontFamily:'var(--disp)',fontWeight:500,fontSize:18}}>{t}</div>
                  <div className="hint">{d}</div>
                </div>
              ))}
            </div>
            <hr className="rule"/>
            <div className="h3" style={{marginBottom:12}}>The rhythm</div>
            <div className="card" style={{padding:'18px 20px',marginBottom:22}}>
              <PaceCard proj={proj} store={store} upd={upd} msWords={msWords} log={pd.log}/>
              <Heatmap log={pd.log}/>
            </div>
            {open.length>0 && <>
              <hr className="rule"/>
              <div className="h3" style={{marginBottom:12}}>Open threads</div>
              {open.slice(0,4).map(f=>(
                <div key={f.id} className="beat" style={{cursor:'pointer'}} onClick={()=>setTab('threads')}>
                  <span className="muted">{f.setup||'(unwritten setup)'}</span>
                </div>
              ))}
            </>}
          </>}
    </div>
  );
}

/* ════════ CODEX ════════ */
function Codex({ctx}){
  const {pd,setPd,flash,jump,clearJump}=ctx;
  const _ctx=ctx;
  const [open,setOpen]=useState(null);
  const [editing,setEditing]=useState(null);
  const [q,setQ]=useState('');
  const [typeFilter,setTypeFilter]=useState('all');
  useEffect(()=>{if(jump&&jump.type==='entity'){setOpen(jump.id);clearJump();}},[jump]);
  const [ren,setRen]=useState(null);
  const [dups,setDups]=useState(null);
  const mergeGroup=ids=>{
    const group=entities.filter(e=>ids.includes(e.id));
    if(group.length<2)return;
    const score=e=>Object.values(e.fields||{}).filter(Boolean).length*2+((e.notes||'').length?2:0)+(e.imageId?2:0)+(e.links||[]).length+(e.tags||[]).length;
    const keeper=group.slice().sort((a,b)=>score(b)-score(a))[0];
    const gone=group.filter(e=>e.id!==keeper.id).map(e=>e.id);
    const remap=id=>gone.includes(id)?keeper.id:id;
    let merged={...keeper};
    group.filter(e=>e.id!==keeper.id).forEach(e=>{
      merged={...merged,
        fields:{...(e.fields||{}),...Object.fromEntries(Object.entries(merged.fields||{}).filter(([k,v])=>v))},
        tags:[...new Set([...(merged.tags||[]),...(e.tags||[])])],
        links:[...new Set([...(merged.links||[]),...(e.links||[])])],
        notes:merged.notes&&e.notes&&merged.notes!==e.notes?merged.notes+'\n\n'+e.notes:(merged.notes||e.notes||''),
        imageId:merged.imageId||e.imageId||null};
    });
    merged.links=[...new Set((merged.links||[]).map(remap))].filter(id=>id!==keeper.id);
    const entities2=entities.filter(e=>!gone.includes(e.id)).map(e=>e.id===keeper.id?merged:{...e,links:[...new Set((e.links||[]).map(remap))].filter(id=>id!==e.id)});
    const rel2={};Object.entries(pd.relations||{}).forEach(([k,v])=>{
      const [a,b]=k.split('|');const na=remap(a),nb=remap(b);
      if(na===nb)return;const nk=na+'|'+nb;if(!rel2[nk])rel2[nk]=v;});
    const pos={...((pd.board&&pd.board.positions)||{})};
    gone.forEach(id=>{if(pos[id]&&!pos[keeper.id])pos[keeper.id]=pos[id];delete pos[id];});
    const canvas2=(pd.canvas||[]).map(b=>({...b,items:b.items.map(it=>it.entId&&gone.includes(it.entId)?{...it,entId:keeper.id}:it)}));
    setPd({entities:entities2,relations:rel2,board:{...(pd.board||{}),positions:pos},canvas:canvas2});
    return keeper.name;
  };

  const entities=pd.entities;
  const byId=useMemo(()=>Object.fromEntries(entities.map(e=>[e.id,e])),[entities]);
  const visible=entities.filter(e=>{
    if(typeFilter!=='all'&&e.type!==typeFilter)return false;
    if(q){const s=q.toLowerCase();return e.name.toLowerCase().includes(s)||(e.notes||'').toLowerCase().includes(s)||(e.tags||[]).some(t=>t.toLowerCase().includes(s));}
    return true;
  });
  const saveEntity=(ent)=>{
    const exists=entities.some(e=>e.id===ent.id);
    const nm=(ent.name||'').trim().toLowerCase();
    const clash=nm&&entities.find(e=>e.id!==ent.id&&(e.name||'').trim().toLowerCase()===nm);
    if(clash&&exists){flash(`“${clash.name}” already exists — merge from the Duplicates tool instead`);return;}
    if(clash&&!exists){
      const merged={...clash,
        fields:{...ent.fields,...Object.fromEntries(Object.entries(clash.fields||{}).filter(([k,v])=>v))},
        tags:[...new Set([...(clash.tags||[]),...(ent.tags||[])])],
        links:[...new Set([...(clash.links||[]),...(ent.links||[])])].filter(id=>id!==clash.id),
        notes:clash.notes&&ent.notes&&clash.notes!==ent.notes?clash.notes+'\n\n'+ent.notes:(clash.notes||ent.notes||''),
        imageId:clash.imageId||ent.imageId||null};
      setPd({entities:entities.map(e=>e.id===clash.id?merged:e)});
      setEditing(null);setOpen(clash.id);flash(`Merged into the existing “${clash.name}”`);return;
    }
    setPd({entities:exists?entities.map(e=>e.id===ent.id?ent:e):[...entities,ent]});
    setEditing(null);flash(exists?'Entry updated':'Added to the Codex');
  };
  const delEntity=(id)=>{
    const next=entities.filter(e=>e.id!==id).map(e=>({...e,links:(e.links||[]).filter(l=>l!==id)}));
    setPd({entities:next});setOpen(null);setEditing(null);flash('Entry removed');
  };
  const newEntity=(type)=>setEditing({id:uid(),type,name:'',fields:{},tags:[],links:[],notes:'',createdAt:now()});

  return (
    <div>
      <div className="between" style={{marginBottom:14}}>
        <div className="row" style={{flex:1}}>
          <input placeholder="Search the codex…" value={q} onChange={e=>setQ(e.target.value)} style={{maxWidth:260}}/>
        </div>
        <button className="btn sm" style={{marginRight:8}} title="Find and merge codex entries that share a name"
          onClick={()=>{const g=findDupGroups(entities);g.length?setDups(g):flash('No duplicates — the Codex is clean');}}>⧉ Duplicates</button>
        <NewEntityBtn onPick={newEntity}/>
      </div>
      <div className="row" style={{gap:6,marginBottom:18}}>
        <span className="lchip" onClick={()=>setTypeFilter('all')}
          style={{color:typeFilter==='all'?'var(--gold2)':'var(--faint)',borderColor:typeFilter==='all'?'var(--gold)':'var(--hair2)',background:'transparent'}}>All · {entities.length}</span>
        {Object.entries(ENTITY_TYPES).map(([k,T])=>{
          const n=entities.filter(e=>e.type===k).length;
          const on=typeFilter===k;
          return <span key={k} className="lchip" onClick={()=>setTypeFilter(on?'all':k)}
            style={{color:on?T.color:'var(--faint)',borderColor:on?T.color:'var(--hair2)',background:'transparent'}}>{T.g} {T.plural}{n?` · ${n}`:''}</span>;
        })}
      </div>

      {visible.length===0
        ? <div className="empty"><div className="glyph">❖</div>
            <div>{q?'Nothing matches that search.':'The codex is empty. Create your first entry, or let Import read a manuscript for you.'}</div>
            {!q && <div className="act"><NewEntityBtn onPick={newEntity} gold/></div>}</div>
        : <div className="grid g2">
            {visible.map(e=>{
              const T=ENTITY_TYPES[e.type];
              const linkCount=(e.links||[]).length+entities.filter(o=>(o.links||[]).includes(e.id)).length;
              return (
                <div key={e.id} className="card hov" onClick={()=>setOpen(e.id)} style={{overflow:'hidden'}}>
                  {e.imageId && <CardBanner id={e.imageId}/>}
                  <div className="between" style={{marginBottom:8}}>
                    <span className="chip" style={{color:T.color,borderColor:T.color+'55'}}>{T.g} {T.label}</span>
                    {linkCount>0 && <span className="muted" style={{fontFamily:'var(--mono)',fontSize:10.5}}>⟡ {linkCount}</span>}
                  </div>
                  <div style={{fontFamily:'var(--disp)',fontWeight:500,fontSize:20}}>{e.name||'(unnamed)'}</div>
                  {e.fields?.role && <div className="hint">{e.fields.role}</div>}
                  {e.notes && <p className="muted" style={{fontSize:13.5,marginTop:6,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{e.notes}</p>}
                  {(e.tags||[]).length>0 && <div style={{marginTop:8}}>{e.tags.slice(0,4).map(t=><span key={t} className="tag">{t}</span>)}</div>}
                </div>
              );
            })}
          </div>}

      {open && byId[open] &&
        <EntityView ent={byId[open]} byId={byId} entities={entities}
          onClose={()=>setOpen(null)} onEdit={()=>setEditing(byId[open])}
          onNav={id=>setOpen(id)} onDelete={()=>delEntity(open)}
          onRename={()=>setRen(byId[open])}/>}
      {ren && <RenameModal ent={ren} ctx={_ctx} close={()=>setRen(null)}/>}
      {dups &&
        <div className="scrim" onClick={()=>setDups(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="mhead"><h3>Duplicate entries</h3><span className="x" onClick={()=>setDups(null)}>×</span></div>
            <div className="mbody">
              <p className="hint" style={{margin:'0 0 12px'}}>Same name, separate entries. Merging keeps the richest one, folds in everything the others hold, and repoints all links, relations, and board cards. Snapshot-free but non-destructive to content.</p>
              {dups.map((g,i)=>(
                <div key={i} className="between" style={{padding:'10px 12px',background:'rgba(255,255,255,.02)',border:'1px solid var(--hair)',borderRadius:10,marginBottom:8}}>
                  <div>
                    <div style={{fontFamily:'var(--disp)',fontWeight:500,fontSize:16,color:'var(--gold2)'}}>{g.name}</div>
                    <div className="hint" style={{fontStyle:'normal',fontSize:11}}>{g.ids.length} entries · {g.types.join(', ')}</div>
                  </div>
                  <button className="btn sm gold" onClick={()=>{mergeGroup(g.ids);
                    setDups(d=>{const rest=d.filter((x,xi)=>xi!==i);return rest.length?rest:null;});
                    flash('Merged “'+g.name+'”');}}>Merge</button>
                </div>
              ))}
              {dups.length>1 &&
                <button className="btn gold" style={{width:'100%',marginTop:6}}
                  onClick={()=>{dups.forEach(g=>mergeGroup(g.ids));setDups(null);flash('All duplicates merged');}}>Merge all {dups.length} groups</button>}
            </div>
          </div>
        </div>}
      {editing &&
        <EntityEditor ent={editing} entities={entities}
          onSave={saveEntity} onClose={()=>setEditing(null)}
          onDelete={entities.some(e=>e.id===editing.id)?()=>delEntity(editing.id):null}/>}
    </div>
  );
}
function CardBanner({id}){
  const url=useImageURL(id);if(!url)return null;
  return <div style={{height:110,margin:'-18px -18px 14px',overflow:'hidden'}}><img src={url} alt="" style={{width:'100%',height:'100%',objectFit:'cover',opacity:.92}}/></div>;
}
function NewEntityBtn({onPick,gold}){
  const [open,setOpen]=useState(false);
  return (
    <div style={{position:'relative'}}>
      <button className={'btn'+(gold!==false?' gold':'')} onClick={()=>setOpen(o=>!o)}>＋ New entry</button>
      {open &&
        <div style={{position:'absolute',right:0,top:'112%',background:'var(--deep)',border:'1px solid var(--hair2)',borderRadius:12,padding:6,zIndex:20,boxShadow:'var(--shadow)',minWidth:176}}>
          {Object.entries(ENTITY_TYPES).map(([k,T])=>(
            <div key={k} className="nitem" onClick={()=>{onPick(k);setOpen(false);}}>
              <span className="g" style={{color:T.color}}>{T.g}</span>{T.label}
            </div>
          ))}
        </div>}
    </div>
  );
}

function EntityView({ent,byId,entities,onClose,onEdit,onNav,onDelete,onRename}){
  const T=ENTITY_TYPES[ent.type];
  const heroUrl=useImageURL(ent.imageId);
  const linked=(ent.links||[]).map(id=>byId[id]).filter(Boolean);
  const backlinks=entities.filter(o=>(o.links||[]).includes(ent.id));
  const linkedIds=new Set(ent.links||[]);
  const onlyBack=backlinks.filter(b=>!linkedIds.has(b.id));
  const F=(ent.fields||{});
  return (
    <div className="scrim" onClick={onClose}>
      <div className="modal wide" onClick={e=>e.stopPropagation()}>
        <div className="mhead">
          <span className="chip" style={{color:T.color,borderColor:T.color+'55'}}>{T.g} {T.label}</span>
          <h3 style={{flex:1}}>{ent.name||'(unnamed)'}</h3>
          <button className="btn sm" onClick={onEdit}>Edit</button>
          {onRename && <button className="btn sm" onClick={onRename} title="Find & replace this name across the whole book">Rename…</button>}
          <span className="x" onClick={onClose}>×</span>
        </div>
        <div className="mbody">
          {ent.imageId&&heroUrl && <img src={heroUrl} alt="" style={{width:'100%',maxHeight:280,objectFit:'cover',borderRadius:12,marginBottom:16}}/>}
          {(ent.tags||[]).length>0 && <div style={{marginBottom:14}}>{ent.tags.map(t=><span key={t} className="tag">{t}</span>)}</div>}
          {T.fields.map(f=>F[f]?(
            <div key={f} className="field">
              <label>{FIELD_LABELS[f]||f}</label>
              <div style={{whiteSpace:'pre-wrap'}}>{F[f]}</div>
            </div>
          ):null)}
          {ent.notes && <div className="field"><label>Notes</label><div style={{whiteSpace:'pre-wrap'}}>{ent.notes}</div></div>}
          <hr className="rule"/>
          <div className="h3" style={{fontSize:16,marginBottom:6}}>Connections</div>
          {linked.length===0&&onlyBack.length===0
            ? <p className="hint">Nothing linked yet. Edit this entry, or bind stars directly in the Galaxy.</p>
            : <>
                {linked.length>0 && <>
                  <div className="field" style={{marginBottom:4}}><label>Links to</label></div>
                  <div>{linked.map(l=><LinkPill key={l.id} ent={l} onClick={()=>onNav(l.id)}/>)}</div>
                </>}
                {onlyBack.length>0 && <>
                  <div className="field" style={{margin:'12px 0 4px'}}><label>Referenced by</label></div>
                  <div>{onlyBack.map(l=><LinkPill key={l.id} ent={l} onClick={()=>onNav(l.id)}/>)}</div>
                </>}
              </>}
        </div>
        <div className="mfoot">
          <button className="btn danger" onClick={onDelete}>Delete</button>
          <div style={{flex:1}}/>
          <button className="btn" onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
}
function LinkPill({ent,onClick}){
  const T=ENTITY_TYPES[ent.type];
  return <span className="pill" onClick={onClick}><span className="dot" style={{background:T.color}}/>{ent.name||'(unnamed)'}</span>;
}

function EntityEditor({ent,entities,onSave,onClose,onDelete}){
  const [e,setE]=useState({...ent,fields:{...ent.fields}});
  const [tagIn,setTagIn]=useState('');
  const T=ENTITY_TYPES[e.type];
  const setF=(k,v)=>setE(s=>({...s,fields:{...s.fields,[k]:v}}));
  const addTag=()=>{const t=tagIn.trim();if(t&&!(e.tags||[]).includes(t)){setE(s=>({...s,tags:[...(s.tags||[]),t]}));}setTagIn('');};
  const toggleLink=(id)=>setE(s=>({...s,links:(s.links||[]).includes(id)?s.links.filter(l=>l!==id):[...(s.links||[]),id]}));
  const others=entities.filter(o=>o.id!==e.id);
  return (
    <div className="scrim" onClick={onClose}>
      <div className="modal wide" onClick={ev=>ev.stopPropagation()}>
        <div className="mhead">
          <span className="chip" style={{color:T.color,borderColor:T.color+'55'}}>{T.g} {T.label}</span>
          <h3>{entities.some(x=>x.id===e.id)?'Edit entry':'New entry'}</h3>
          <span className="x" onClick={onClose}>×</span>
        </div>
        <div className="mbody">
          <div className="field"><label>Name</label>
            <input value={e.name} autoFocus onChange={ev=>setE(s=>({...s,name:ev.target.value}))} placeholder={`Name this ${T.label.toLowerCase()}…`}/></div>
          <div className="field"><label>Portrait / image</label>
            <EntityImageField e={e} setE={setE}/></div>
          {T.fields.map(f=>(
            <div key={f} className="field"><label>{FIELD_LABELS[f]||f}</label>
              {['description','summary','history','rules','arc','personality','properties','consequence','ideology','goals'].includes(f)
                ? <textarea rows={3} value={e.fields[f]||''} onChange={ev=>setF(f,ev.target.value)}/>
                : <input value={e.fields[f]||''} onChange={ev=>setF(f,ev.target.value)}/>}
            </div>
          ))}
          <div className="field"><label>Notes</label>
            <textarea rows={3} value={e.notes||''} onChange={ev=>setE(s=>({...s,notes:ev.target.value}))}/></div>
          <div className="field"><label>Tags</label>
            <div className="row" style={{gap:6}}>
              <input value={tagIn} onChange={ev=>setTagIn(ev.target.value)} onKeyDown={ev=>ev.key==='Enter'&&(ev.preventDefault(),addTag())} placeholder="Add a tag, press Enter" style={{maxWidth:230}}/>
              <button className="btn sm" onClick={addTag}>Add</button>
            </div>
            <div style={{marginTop:8}}>{(e.tags||[]).map(t=>(
              <span key={t} className="tag" style={{cursor:'pointer'}} onClick={()=>setE(s=>({...s,tags:s.tags.filter(x=>x!==t)}))}>{t} ×</span>
            ))}</div>
          </div>
          <hr className="rule"/>
          <div className="field"><label>Link to other entries</label></div>
          {others.length===0
            ? <p className="hint">Create more entries first, then bind them here or in the Galaxy.</p>
            : <div style={{maxHeight:190,overflowY:'auto',border:'1px solid var(--hair)',borderRadius:11,padding:8}}>
                {others.map(o=>{
                  const on=(e.links||[]).includes(o.id);const OT=ENTITY_TYPES[o.type];
                  return (
                    <div key={o.id} onClick={()=>toggleLink(o.id)}
                      style={{display:'flex',alignItems:'center',gap:9,padding:'6px 9px',borderRadius:8,cursor:'pointer',background:on?'rgba(var(--goldRGB),.08)':'transparent',border:'1px solid '+(on?'rgba(var(--goldRGB),.45)':'transparent')}}>
                      <span style={{width:16,textAlign:'center',color:on?'var(--gold2)':'var(--faint)',fontSize:12}}>{on?'✓':''}</span>
                      <span className="dot" style={{background:OT.color}}/>
                      <span>{o.name||'(unnamed)'}</span>
                      <span className="muted" style={{marginLeft:'auto',fontSize:11}}>{OT.label}</span>
                    </div>
                  );
                })}
              </div>}
        </div>
        <div className="mfoot">
          {onDelete && <button className="btn danger" onClick={onDelete}>Delete</button>}
          <div style={{flex:1}}/>
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn gold" disabled={!e.name.trim()} onClick={()=>onSave(e)}>Save entry</button>
        </div>
      </div>
    </div>
  );
}

/* ════════ GALAXY ════════ */
function Galaxy({ctx}){
  const {pd,setPd,flash}=ctx;
  const entities=pd.entities;
  const wrapRef=useRef(),canvasRef=useRef();
  const S=useRef(null); // mutable sim state
  if(!S.current){
    S.current={nodes:[],nid:{},view:{x:0,y:0,k:0.85},alpha:1,hover:null,drag:null,pan:null,
      mouse:{x:0,y:0,wx:0,wy:0},linkFrom:null,images:new Map(),stars:null,t:0,didFit:false};
  }
  const [inspect,setInspect]=useState(null);
  const [editing,setEditing]=useState(null);
  const [linkMode,setLinkMode]=useState(false);
  const [linkFromUi,setLinkFromUi]=useState(null);
  const [edgePop,setEdgePop]=useState(null);   // {from,to,sx,sy}
  const [quickAdd,setQuickAdd]=useState(null); // {sx,sy,wx,wy}
  const [hidden,setHidden]=useState({});
  const [q,setQ]=useState('');
  const pendingPos=useRef(null);
  const hiddenRef=useRef(hidden);hiddenRef.current=hidden;
  const linkModeRef=useRef(linkMode);linkModeRef.current=linkMode;
  const pdRef=useRef(pd);pdRef.current=pd;
  const relations=pd.relations||{};
  const relRef=useRef(relations);relRef.current=relations;

  const typeKeys=Object.keys(ENTITY_TYPES);
  const anchor=(type)=>{const i=typeKeys.indexOf(type);const a=(i/typeKeys.length)*Math.PI*2-Math.PI/2;
    return {x:Math.cos(a)*340,y:Math.sin(a)*340};};

  /* sync entities -> sim nodes */
  useEffect(()=>{
    const s=S.current;const keep={};
    const stored=(pd.board&&pd.board.positions)||{};
    entities.forEach(e=>{
      let n=s.nid[e.id];
      if(!n){
        const st=stored[e.id];const an=anchor(e.type);
        n={id:e.id,x:st?st.x:an.x+(Math.random()*220-110),y:st?st.y:an.y+(Math.random()*220-110),
           vx:0,vy:0,pinned:!!st};
        s.alpha=Math.max(s.alpha,.6);
      }
      n.type=e.type;n.name=e.name;n.imageId=e.imageId;
      keep[e.id]=n;
      if(e.imageId&&!s.images.has(e.imageId)){
        s.images.set(e.imageId,'loading');
        idbGet(e.imageId).then(rec=>{if(rec){const im=new Image();im.onload=()=>s.images.set(e.imageId,im);im.src=rec.dataUrl;}}).catch(()=>{});
      }
    });
    s.nid=keep;s.nodes=entities.map(e=>keep[e.id]);
    // co-occurrence: how often two entities share a chapter's prose
    const co={};
    const lows=entities.filter(e=>e.name&&e.name.length>2).map(e=>({id:e.id,n:e.name.toLowerCase()}));
    Object.values(pd.manuscript||{}).forEach(m=>{
      const t=((m&&m.text)||'').toLowerCase();if(!t)return;
      const present=lows.filter(e=>t.includes(e.n)).map(e=>e.id);
      for(let i=0;i<present.length;i++)for(let j=i+1;j<present.length;j++){
        const k=present[i]<present[j]?present[i]+'|'+present[j]:present[j]+'|'+present[i];
        co[k]=(co[k]||0)+1;
      }
    });
    const coOf=(a,b)=>co[a<b?a+'|'+b:b+'|'+a]||0;
    // combined degree: explicit links + interaction partners
    const deg={};entities.forEach(e=>{deg[e.id]=deg[e.id]||0;(e.links||[]).forEach(t=>{deg[e.id]++;deg[t]=(deg[t]||0)+1;});});
    const cdeg={...deg};
    Object.keys(co).forEach(k=>{const [a,b]=k.split('|');cdeg[a]=(cdeg[a]||0)+.6;cdeg[b]=(cdeg[b]||0)+.6;});
    s.nodes.forEach(n=>{n.deg=deg[n.id]||0;n.cdeg=cdeg[n.id]||0;n.r=10+Math.min(15,(n.cdeg||0)*1.9);});
    s.edges=[];entities.forEach(e=>{(e.links||[]).forEach(t=>{if(keep[t])s.edges.push({a:keep[e.id],b:keep[t],from:e.id,to:t,w:1+Math.min(6,coOf(e.id,t))*.5});});});
    // layout-only springs: strong co-occurrence without an explicit link still draws points together
    const linked=new Set(s.edges.map(ed=>ed.from<ed.to?ed.from+'|'+ed.to:ed.to+'|'+ed.from));
    s.springs=[];
    Object.entries(co).forEach(([k,n2])=>{
      if(n2<2||linked.has(k))return;
      const [a,b]=k.split('|');
      if(keep[a]&&keep[b])s.springs.push({a:keep[a],b:keep[b],w:Math.min(4,n2*.6)});
    });
    s.alpha=Math.max(s.alpha,.5);
  },[entities,pd.board,pd.manuscript]);

  const persistPositions=useCallback(()=>{
    const s=S.current;const pos={};
    s.nodes.forEach(n=>{if(n.pinned)pos[n.id]={x:Math.round(n.x),y:Math.round(n.y)};});
    setPd({board:{...(pdRef.current.board||{}),positions:pos}});
  },[setPd]);

  const addLink=useCallback((a,b)=>{
    const ents=pdRef.current.entities;
    if(a===b)return;
    const src=ents.find(e=>e.id===a);
    if(src&&(src.links||[]).includes(b)){flash('Already bound');return;}
    setPd({entities:ents.map(e=>e.id===a?{...e,links:[...(e.links||[]),b]}:e)});
    S.current.alpha=Math.max(S.current.alpha,.5);
    flash('Bound: '+(S.current.nid[a]?.name||'')+' → '+(S.current.nid[b]?.name||''));
  },[setPd,flash]);
  const removeLink=useCallback((a,b)=>{
    const ents=pdRef.current.entities;
    const r={...(pdRef.current.relations||{})};delete r[a+'|'+b];
    setPd({entities:ents.map(e=>e.id===a?{...e,links:(e.links||[]).filter(l=>l!==b)}:e),relations:r});
    setEdgePop(null);flash('Connection removed');
  },[setPd,flash]);
  const setRelation=useCallback((key,val)=>{
    const r={...(pdRef.current.relations||{})};
    if(val.trim())r[key]=val;else delete r[key];
    setPd({relations:r});
  },[setPd]);

  const focusNode=useCallback((id)=>{
    const s=S.current,n=s.nid[id];if(!n)return;
    const rect=wrapRef.current.getBoundingClientRect();
    const k=Math.max(s.view.k,1.05);
    s.view={k,x:rect.width/2-n.x*k,y:rect.height/2-n.y*k};
    setInspect(id);
  },[]);

  /* canvas loop */
  useEffect(()=>{
    const canvas=canvasRef.current,wrap=wrapRef.current;
    const ctx2=canvas.getContext('2d');
    let raf,running=true;
    const dpr=Math.min(window.devicePixelRatio||1,2);

    const resize=()=>{const r=wrap.getBoundingClientRect();
      canvas.width=r.width*dpr;canvas.height=r.height*dpr;
      canvas.style.width=r.width+'px';canvas.style.height=r.height+'px';};
    resize();const ro=new ResizeObserver(resize);ro.observe(wrap);

    const s=S.current;
    if(!s.stars){
      s.stars=[];
      for(let i=0;i<200;i++)s.stars.push({x:Math.random()*3200-1600,y:Math.random()*2400-1200,r:Math.random()*1.1+.3,p:.3,tw:Math.random()*6});
      for(let i=0;i<70;i++)s.stars.push({x:Math.random()*3200-1600,y:Math.random()*2400-1200,r:Math.random()*1.5+.7,p:.55,tw:Math.random()*6});
    }

    const visList=()=>s.nodes.filter(n=>!hiddenRef.current[n.type]);
    const visEdges=()=>s.edges.filter(ed=>!hiddenRef.current[ed.a.type]&&!hiddenRef.current[ed.b.type]);

    function step(){
      if(s.alpha<.012)return;
      const a=s.alpha,N=visList();
      for(let i=0;i<N.length;i++){const n1=N[i];
        for(let j=i+1;j<N.length;j++){const n2=N[j];
          let dx=n1.x-n2.x,dy=n1.y-n2.y;let d2=dx*dx+dy*dy;
          if(d2<1){dx=Math.random()-.5;dy=Math.random()-.5;d2=1;}
          if(d2>240000)continue;
          const f=(2900*a)/d2;
          const fx=dx*f,fy=dy*f;
          if(!n1.fixed){n1.vx+=fx;n1.vy+=fy;}
          if(!n2.fixed){n2.vx-=fx;n2.vy-=fy;}
        }}
      visEdges().forEach(ed=>{
        const w=ed.w||1;
        const dx=ed.b.x-ed.a.x,dy=ed.b.y-ed.a.y;
        const d=Math.sqrt(dx*dx+dy*dy)||1;
        const rest=Math.max(72,178-(w-1)*34);
        const f=(d-rest)*(0.008+0.0035*Math.min(3,w))*a;
        const fx=dx/d*f,fy=dy/d*f;
        if(!ed.a.fixed){ed.a.vx+=fx;ed.a.vy+=fy;}
        if(!ed.b.fixed){ed.b.vx-=fx;ed.b.vy-=fy;}
      });
      (s.springs||[]).forEach(sp=>{
        if(hiddenRef.current[sp.a.type]||hiddenRef.current[sp.b.type])return;
        const dx=sp.b.x-sp.a.x,dy=sp.b.y-sp.a.y;
        const d=Math.sqrt(dx*dx+dy*dy)||1;
        const f=(d-140)*0.0035*Math.min(2.5,sp.w)*a;
        const fx=dx/d*f,fy=dy/d*f;
        if(!sp.a.fixed){sp.a.vx+=fx;sp.a.vy+=fy;}
        if(!sp.b.fixed){sp.b.vx-=fx;sp.b.vy-=fy;}
      });
      N.forEach(n=>{
        if(n.fixed)return;
        const an=anchor(n.type);
        const cw=Math.min(1,(n.cdeg||0)/4);
        n.vx+=(an.x-n.x)*0.0026*(1-cw)*a+(0-n.x)*(0.0006+0.0026*cw)*a;
        n.vy+=(an.y-n.y)*0.0026*(1-cw)*a+(0-n.y)*(0.0006+0.0026*cw)*a;
        n.vx*=.84;n.vy*=.84;
        const sp=Math.sqrt(n.vx*n.vx+n.vy*n.vy);
        if(sp>9){n.vx*=9/sp;n.vy*=9/sp;}
        n.x+=n.vx;n.y+=n.vy;
      });
      s.alpha*=.986;
    }

    function rr(x,y,w,h,r){ctx2.beginPath();ctx2.moveTo(x+r,y);ctx2.arcTo(x+w,y,x+w,y+h,r);ctx2.arcTo(x+w,y+h,x,y+h,r);ctx2.arcTo(x,y+h,x,y,r);ctx2.arcTo(x,y,x+w,y,r);ctx2.closePath();}

    function draw(){
      s.t+=.016;
      const W=canvas.width/dpr,H=canvas.height/dpr;
      ctx2.setTransform(dpr,0,0,dpr,0,0);
      ctx2.clearRect(0,0,W,H);
      const v=s.view;
      // starfield (parallax layers)
      s.stars.forEach(st=>{
        const sx=st.x*v.k*st.p+v.x*st.p+W*(1-st.p)/2;
        const sy=st.y*v.k*st.p+v.y*st.p+H*(1-st.p)/2;
        if(sx<-4||sx>W+4||sy<-4||sy>H+4)return;
        const tw=.45+.4*Math.sin(s.t*1.3+st.tw);
        ctx2.globalAlpha=tw*(st.p>.4?.8:.5);
        ctx2.fillStyle=st.p>.4?'#d8cdb2':'#9aa3bd';
        ctx2.beginPath();ctx2.arc(sx,sy,st.r,0,7);ctx2.fill();
      });
      ctx2.globalAlpha=1;

      ctx2.save();ctx2.translate(v.x,v.y);ctx2.scale(v.k,v.k);
      const hov=s.hover;
      const connected=new Set();
      if(hov){connected.add(hov);
        s.edges.forEach(ed=>{if(ed.from===hov)connected.add(ed.to);if(ed.to===hov)connected.add(ed.from);});}

      // edges
      visEdges().forEach(ed=>{
        const hot=hov&&(ed.from===hov||ed.to===hov);
        const dimd=hov&&!hot;
        const w=ed.w||1;
        if(!hot&&v.k<.55&&w<1.5)return;
        const dx=ed.b.x-ed.a.x,dy=ed.b.y-ed.a.y,d=Math.sqrt(dx*dx+dy*dy)||1;
        const ux=dx/d,uy=dy/d;
        const ax=ed.a.x+ux*(ed.a.r+4),ay=ed.a.y+uy*(ed.a.r+4);
        const bx=ed.b.x-ux*(ed.b.r+7),by=ed.b.y-uy*(ed.b.r+7);
        ctx2.strokeStyle=hot?'rgba(238,213,152,.85)':'rgba(var(--goldRGB),'+(dimd?.05:(.13+.09*Math.min(3,w)))+')';
        ctx2.lineWidth=((hot?1.7:.7+.25*Math.min(3,w)))/v.k+(hot?.6:0);
        ctx2.shadowBlur=hot?8:0;ctx2.shadowColor='rgba(238,213,152,.7)';
        ctx2.beginPath();ctx2.moveTo(ax,ay);ctx2.lineTo(bx,by);ctx2.stroke();
        ctx2.shadowBlur=0;
        // arrowhead
        if(!hot&&v.k<.9){ctx2.shadowBlur=0;}else{
        ctx2.fillStyle=hot?'rgba(238,213,152,.9)':'rgba(var(--goldRGB),'+(dimd?.08:.45)+')';
        const ah=5.5;
        ctx2.beginPath();
        ctx2.moveTo(bx,by);
        ctx2.lineTo(bx-ux*ah-uy*ah*.55,by-uy*ah+ux*ah*.55);
        ctx2.lineTo(bx-ux*ah+uy*ah*.55,by-uy*ah-ux*ah*.55);
        ctx2.closePath();ctx2.fill();}
        // label
        const lbl=relRef.current[ed.from+'|'+ed.to];
        if(lbl&&(hot||v.k>=.95)&&!dimd){
          const mx=(ax+bx)/2,my=(ay+by)/2;
          ctx2.font='10px JetBrains Mono';
          const tw=ctx2.measureText(lbl).width;
          ctx2.fillStyle='rgba(10,11,16,.85)';
          rr(mx-tw/2-7,my-9,tw+14,18,6);ctx2.fill();
          ctx2.strokeStyle=hot?'rgba(238,213,152,.6)':'rgba(var(--goldRGB),.3)';ctx2.lineWidth=1/v.k;ctx2.stroke();
          ctx2.fillStyle=hot?'#eed598':'#a59c86';
          ctx2.textAlign='center';ctx2.textBaseline='middle';
          ctx2.fillText(lbl,mx,my+.5);
        }
      });

      // link-in-progress
      if(s.linkFrom&&s.nid[s.linkFrom]){
        const n=s.nid[s.linkFrom];
        ctx2.setLineDash([5,5]);
        ctx2.strokeStyle='rgba(238,213,152,.8)';ctx2.lineWidth=1.4/v.k;
        ctx2.beginPath();ctx2.moveTo(n.x,n.y);ctx2.lineTo(s.mouse.wx,s.mouse.wy);ctx2.stroke();
        ctx2.setLineDash([]);
      }

      // nodes
      visList().forEach(n=>{
        const T=ENTITY_TYPES[n.type];
        const hot=hov===n.id, near=connected.has(n.id);
        const dimd=hov&&!near;
        ctx2.globalAlpha=dimd?.22:1;
        // glow
        const glowR=n.r*(hot?2.6:2.0)+(hot?3*Math.sin(s.t*2.4):0);
        const gr=ctx2.createRadialGradient(n.x,n.y,n.r*.4,n.x,n.y,glowR);
        gr.addColorStop(0,T.color+(hot?'66':'40'));
        gr.addColorStop(1,T.color+'00');
        ctx2.fillStyle=gr;
        ctx2.beginPath();ctx2.arc(n.x,n.y,glowR,0,7);ctx2.fill();
        // body
        const img=n.imageId?s.images.get(n.imageId):null;
        if(img&&img!=='loading'){
          ctx2.save();ctx2.beginPath();ctx2.arc(n.x,n.y,n.r,0,7);ctx2.clip();
          const sc=Math.max(n.r*2/img.width,n.r*2/img.height);
          ctx2.drawImage(img,n.x-img.width*sc/2,n.y-img.height*sc/2,img.width*sc,img.height*sc);
          ctx2.restore();
        }else{
          ctx2.fillStyle='#0d0f17';
          ctx2.beginPath();ctx2.arc(n.x,n.y,n.r,0,7);ctx2.fill();
          ctx2.fillStyle=T.color;ctx2.globalAlpha=(dimd?.22:1)*.9;
          ctx2.font='500 '+Math.max(9,n.r*.95)+'px Cormorant Garamond';
          ctx2.textAlign='center';ctx2.textBaseline='middle';
          ctx2.fillText((n.name||'·').charAt(0).toUpperCase(),n.x,n.y+1);
          ctx2.globalAlpha=dimd?.22:1;
        }
        ctx2.strokeStyle=T.color;ctx2.lineWidth=(hot?2:1.3)/Math.sqrt(v.k);
        ctx2.beginPath();ctx2.arc(n.x,n.y,n.r,0,7);ctx2.stroke();
        if(n.pinned){ctx2.fillStyle='#eed598';ctx2.beginPath();ctx2.arc(n.x+n.r*.78,n.y-n.r*.78,2.2,0,7);ctx2.fill();}
        // label
        const showLbl=hot||near||v.k>.85||(n.cdeg||0)>=5;
        if(showLbl){
          ctx2.font=(hot?'500 ':'400 ')+'12.5px Spectral';
          ctx2.textAlign='center';ctx2.textBaseline='top';
          ctx2.fillStyle='rgba(8,9,13,.7)';
          const nm=n.name||'(unnamed)';
          const tw2=ctx2.measureText(nm).width;
          rr(n.x-tw2/2-5,n.y+n.r+4,tw2+10,17,5);ctx2.fill();
          ctx2.fillStyle=hot?'#eed598':(dimd?'rgba(233,226,208,.4)':'#cfc7b2');
          ctx2.fillText(nm,n.x,n.y+n.r+6.5);
        }
        ctx2.globalAlpha=1;
      });
      ctx2.restore();
    }

    function loop(){if(!running)return;step();draw();raf=requestAnimationFrame(loop);}
    loop();

    /* fit once on first open with content */
    const fitNow=()=>{
      const N=s.nodes.filter(n=>!hiddenRef.current[n.type]);if(!N.length)return;
      const r=wrap.getBoundingClientRect();
      const xs=N.map(n=>n.x),ys=N.map(n=>n.y);
      const minX=Math.min(...xs)-60,maxX=Math.max(...xs)+60,minY=Math.min(...ys)-60,maxY=Math.max(...ys)+60;
      const k=Math.min(1.6,Math.max(.3,Math.min(r.width/(maxX-minX),r.height/(maxY-minY))));
      s.view={k,x:(r.width-(maxX+minX)*k)/2,y:(r.height-(maxY+minY)*k)/2};
    };
    s.fit=fitNow;
    if(!s.didFit){setTimeout(()=>{fitNow();s.didFit=true;},420);}

    /* pointer interaction */
    const toWorld=(cx,cy)=>{const r=wrap.getBoundingClientRect();
      return {x:(cx-r.left-s.view.x)/s.view.k,y:(cy-r.top-s.view.y)/s.view.k};};
    const hitNode=(wx,wy)=>{
      const N=s.nodes.filter(n=>!hiddenRef.current[n.type]);
      for(let i=N.length-1;i>=0;i--){const n=N[i];
        const dx=wx-n.x,dy=wy-n.y;if(dx*dx+dy*dy<=(n.r+5)*(n.r+5))return n;}
      return null;};
    const hitEdge=(wx,wy)=>{
      let best=null,bd=8/s.view.k+3;
      s.edges.forEach(ed=>{
        if(hiddenRef.current[ed.a.type]||hiddenRef.current[ed.b.type])return;
        const x1=ed.a.x,y1=ed.a.y,x2=ed.b.x,y2=ed.b.y;
        const L2=(x2-x1)**2+(y2-y1)**2;if(!L2)return;
        let t=((wx-x1)*(x2-x1)+(wy-y1)*(y2-y1))/L2;t=Math.max(.12,Math.min(.88,t));
        const px=x1+t*(x2-x1),py=y1+t*(y2-y1);
        const d=Math.hypot(wx-px,wy-py);
        if(d<bd){bd=d;best=ed;}});
      return best;};

    const down=e=>{
      if(e.target!==canvas)return;
      canvas.setPointerCapture(e.pointerId);
      const w=toWorld(e.clientX,e.clientY);
      const n=hitNode(w.x,w.y);
      setEdgePop(null);setQuickAdd(null);
      if(n){
        if(linkModeRef.current){
          if(!s.linkFrom){s.linkFrom=n.id;setLinkFromUi(n.id);}
          else{addLink(s.linkFrom,n.id);s.linkFrom=null;setLinkFromUi(null);}
          return;
        }
        s.drag={n,ox:w.x-n.x,oy:w.y-n.y,moved:false};
        n.fixed=true;
      }else{
        const ed=hitEdge(w.x,w.y);
        if(ed){
          const r=wrap.getBoundingClientRect();
          const mx=(ed.a.x+ed.b.x)/2,my=(ed.a.y+ed.b.y)/2;
